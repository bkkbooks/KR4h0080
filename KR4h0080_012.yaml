body:
  text: 宛陵羣英集巻十二元汪澤民張師愚同編今體七言絶句宋周紫芝案紫芝字少隠年六十一始以廷對第三人出身歴右司員外郎知興國軍秩滿奉祠歸入廬山終焉所著有太倉稊米集竹坡詞竹坡詩話楚詞贅説等若干巻宿秋霜閣後方丈秋霜落後題詩處醉墨淋漓苦未乾不見窮愁孟東野亂峯空鎖一溪寒李宏宿秋霜閣方丈青山夭矯虯龍蟠溪流㵼竭灘聲乾履霜未落秋尚早夜半巳作貂裘寒吳潜京廨即事春陰漠漠䕶輕寒春晝無聊午夢闌幽鳥不知人意改銜花飛傍小䦨干陪陳立道中書泛湖幽幽池館鎻蒼苔萬朶芙蓉取次開却似昭陽舊宫女含嬌只待翠華來絃管叢中畫舫行都人一一荷昇平飛鴻不識人間事猶帶窮邉腸斷聲元王圭劉有之還京口簡梁中砥知宫為謝詩家塵外人别來消息斷無聞如何占得三峯住不寄山中一片雲王璋題三笑圖白社風流二士俱過溪沽酒總縁渠偶然一笑初無意又落人間作畫圗汪鑫戍婦詞兩地魂消萬里愁君猶荒戍妾空樓去時抛棄無情鏡留與歸人照白頭象尺金刀對玉缸團花裁破鷓鴣雙沙塲争信深閨夜忍淚縫衣月半牕嬋娟霜月照荒垣妾擁重衾尚怯單况是玉門關外雪夜深沙漠鐵衣寒塞邊無雁可傳書門外無山可望夫獨有栁營千里月素娥深夜伴人孤胡寛和仲章艤舟陵州橋下韻髙栁黄鸝喚晝眠陵州城外御河邊遥遥雲霧蒼龍闕汎汎波濤彩鷁船陶應靁辛未六月盛暑中過翼然亭小寐拂枕松風卧翼然夢囬那信是炎天泉聲只在桃花下一似廬山聽雨眠長門怨十二首拜月香殘獨掩扉玉堦風葉斷腸時羊車知又向何處空自將鹽灑竹枝擬摘梅花貼鬢嬌未曾掠削早無聊承恩不似金盤雪得到龍屏暖處消慚問金輿過鳳池緑雲斜軃曉粧遲試陪杏苑尋雙蘂暗卜東皇屬阿誰水殿風生暑氣微翠娥新寵實忘歸誰知寂寞朱簾裏卧聽笙歌半掩扉玉街月映水晶宫何日承恩浥露濃天上佳期猶有凖一年一度定相逢沉香亭畔百花開知是君王宴賞來遥聽簫韶聲九奏何時得奉萬年杯垂栁陰陰正日長波澄太液午風凉應知避暑披香殿薄命無由侍玉皇寶殿傳呼宴鳳樓一天明月桂花秋此時誰舞霓裳曲寂寞深宫祇自愁飛瓊冷入畫簷深龍麝重熏翡翠衾手撚梅花腸欲斷不辭買賦費千金脉脉無言傍鏡臺曉粧應妬小桃腮自憐不及雙飛燕幾入昭陽深處囬風度荷花小殿香淺沙依舊浴鴛鴦御書翠扇恩猶在偏憶金輿夜納凉仙桂花開月漸明惱人心碎是蛩聲不禁枕畔梧桐落欲夢君王夢不成汪珍故鄉林缺朝陽射屋橑小牕清露滴芭蕉無端喚覺鄉園夢竹外一聲婆餅焦龍吟寺前鐵石岸偕寺僧携酒泛舟青山漠漠水天平想見江天入眼明借我扁舟潭上宿卧聽踈雨打篷聲遊無為庵竹埤杉垣記昔遊洞門花落石床幽白雲飛盡四山碧黄鶴一聲天地秋陵陽歌陵陽城頭落日黄陵陽城下水茫茫樓中少婦吹羌笛時有征人思故鄉墨梅三更四更霜壓屋一枝二枝風折竹江南嵗晚客未歸夢入溪烟小横幅何致中山居暮春苦棟吹香栁絮飛杜鵑聲裏夕陽微惜花誰唱留春曲花雨滿簾春自歸張師愚游彰教寺春風延客為開關天雨空花紫翠間欲向雲中問鷄犬蒼蒼松栢暗丁山葉縣鳬飛杳莫尋河陽桃李失春陰空餘馬鬛遺封在天禄閒眠碧草深吳琳按琳丞相潜次子嘗討台州賊楊鎮龍有功陞江東招討使司鎮金陵農家野火相連打麥田仰㸔斗轉月低弦古來但説農家樂夜半誰知未得眠汪澤民題子昻畫馬圗千里龍媒瑞世間拳毛如雪汗溝殷飛騰不待韓生畫自是當年十二閑黄河道中寶林溪水碧於藍石竹庭柯黛色參落盡棃花寒食過幾囬歸夢繞江南晚渡桃源日未西緑陰村巷轉逶迤菜花籬落飛黄蝶恰似南園雨霽時二月十日同諸彦游彰教寺秋來遊興日相關帶雨㸔花紫翠間閒讀唐碑訪陳迹石麟殘缺卧丁山施琪雙溪舟行扁舟鼓枻下灘來驚起沙鷗去復囬我是江湖風月友忘機來往不須猜吳鍈丁巳立春笑㸔風景異鄉春綵筆題詩發興新遥想椒花堂上酒醉時頻説未歸人汪天驥次暮春韻為愛雲林緑錦苔柴門花落晝慵開竹牀讀罷南華巻蝶夢蘧蘧枕上來春暮戲滄州扶醉相思日又斜茅齋門外即天涯先生不出渾閒事凍却東園幾度花王鼇叟題秋江獨釣圗一葉煙波𣺌𣺌間此身常與白鷗閑秋江落日收緡盡獨坐船頭㸔逺山髙徳夀失題蘭溪雪消江水來蘭溪日落舟人催問郎今夜南海去煙波萬里何時囬林方戍婦詞九月嚴霜塞下飛連營囬首望寒衣將軍縱上移屯奏無奈公卿半是非張思濓題關尹問道圖關門令尹苦紛紛道徳胡為問老君柱史習知周制度不詢殘缺補經文送道士春雲染濕紫煙衣青山萬重黄鶴飛蓬萊逺在弱水外何日歸來丁令威丁繼道題汪宗文住南山道院詩巻竹杖花瓢自徃還無人識得老樵顔謫仙相訪不相見惆悵題詩下碧山歸隠南山第一巔樵仙跨鶴去多年琅函秘訣雲深鎖留待君來手自傳孫彛競渡紅錦髙標蓮葉浦綵龍飛處㨗如神此時標下争先客正似權門觸熱人蕭澥商婦怨騎馬出門踰兩年知君鞭算地流錢可憐兒小誰耕種荒却原頭一半田李膺叔餞張叔禮離亭飲酒匆匆别廽首西山日掛巖駐馬長堤攀古栁北風吹淚濕征衫王元粹夏日雜興二首綠槐夾道午隂濃閒坐開襟喜受風天際黒雲何處雨孤村却在夕陽中寂寂閒齋晝掩扉苔華草色暗侵衣忽然一陣西來雨捲起踈簾放燕歸附七言絶句按永樂大典内凡係失名失題無考者附後寄題漁隠無風波處漁家元自有風波無處遥應樂更多晚嵗捲簾㸔雪坐笑渠江上冷披蓑春日東風破寒入幽谷殘雪消時燒痕綠林花鬭日媚于頰野蕨登盤甘勝肉南漪新渌晴滿湖春來行樂何處無一樽我欲就花飲花下啼禽能勸沽又酬友人春日見寄韻蔌蔌菲菲委地紅闌干不解隔狂風詩人莫道尋芳晚留得餘春綠樹中清景行行一徑苔蘭樽特為晚春開緑陰青子猶堪賞昨日遊人自不來又和戴剡源春日雜題天寒游子怯春衣夜夜髙堂只夢歸囬首敬亭山下路東風千里白雲飛庭中紅葉霜葉紅腴錦不如隨風零落下庭除丁寧莫遣兒童掃留與幽人自學書御河夜宿聞吳歌江聲拍枕艣聲齊霜滿篷牕月半低卧聽吳歌度村渚恍然身在浙江西白景宣憲僉來江東翰林李士𢎞作墨竹以贈題其後云貢仲章王氏兄弟不可無詩白公以見示因題巻末冰梢偃蹇出林叢照眼炎雲一洗空持贈綉衣知有意好將南國作清風酬寄葉梅邊無意談經向石渠却來湖上結茅廬閉門不作紅塵夢自把山中甲子書深夜青缸有恨月同孤小閣無人雪擁爐貪睡梅花渾不醒一聲鄰笛為驚呼丈室散花天亦久何曾破裓有花痕但教魔女分燈去未是毗耶不二門漁父歌船頭唱歌船尾和栁眼含春青未破溪水潮來長半篙應是前村山雨大秋江古木作棟何慙汗萬牛文章不露幾經秋未應江北江南岸長為漁翁繫釣舟夢歸明滅孤燈照寂寥歸心無奈轉迢迢青山不隔思親夢昨夜曾過九里橋
