body:
  text: 宛陵羣英集卷二元汪澤民張師愚同編古體五言元汪澤民案澤民字叔志宋端明殿學士藻七世孫登延祐進士第纍遷集賢學士以嘉議大夫禮部尚書致仕後陷於蘄黃賊不屈遇害贈譙國郡公諡文節所著有春秋纂疏及巢深燕山宛陵三稿元史有傳夀王子榮黃山插天表􅍶崒蓮峯竒羣仙此遊盤千載令人思佳士志幽賞秀色攬無遺歸來碧筒酒髙詠黃山詩况悟攝生理松喬當與期送陳公輔入京璠璵韞山石華薄浮輝光美人秉貞度聲聞從風翔憲曹厭煩局黌序登俊良囊書上京畿秋風駛征航所知滿朝行有善當見揚無為念逺别天衢即騰驤送仲淵歸覲畢住石城齋居嗟余寡兄弟夙齡仰儒珍自諧平生志匪以綢繆姻圭組非所懷丘壑思為鄰玄豹著文章尺蠖慙屈伸流聲振江滸祛蔽淑斯人石城弦歌樂令德日巳新方念春時往還及夏清辰燕酌豈不歡惆悵别何頻徒企蔣生徑旋問孔氏津秋期遲采菊歸慰髙堂親夜與張叔輿同宿因懷仲淵有作連朝阻良覯暮節慨幽獨執手一欣然遂此東齋宿語闌餘燼暗意愜清夢熟覺來踈雨聲月露滴修竹聽禽林景變見日塵事蹙仲氏有素期結廬向蒼麓唐薛元鼎使西域具言河源澄瑩冬春可涉衆水合之益逺益濁人之縱於欲而汨其真者亦猶是夫友人感慨賦詩因和其韻河水本清淺西來自崑崙泉流一以合混混終莫分龍門疏鑿功積石聲潺湲誰云一寸膠可救萬里渾荒哉乘槎子漫遡天潢源四月初飲于清勝園之錦波亭分韻得猶字改序氣清淑振衣散煩憂郊園念前賞朋友還相求彼美洛中花千金信難酬穠華廣陵秀瑞應將誰儔撫節感行役玩芳久夷猶虛亭一流憩酌醴增綢繆孰云風景殊宛若江南遊白雲起遐心明月空暗投􅎵瀡具足樂歸哉勿淹留送羅與可象山山長象山萃靈秀竒異駕南州矯矯荆門翁讀書樂深幽因之表嘉號結宇來朋儔儀刑歷嵗月俎豆嚴春秋伊昔鵝湖會論學不相謀先覺推無極天壤同周流至理照日星何煩獨旁搜朱陸匪私巳後來徒喧啾羅君士林彥萬里開驊騮升堂即斯席鼓篋集英遊山水信清美親友贈綢繆分隂足可惜遺編需講求元統乙亥十月初吉偕諸友遊白鹿洞拜文公先生祠楚濱饒君實奉祠事移尊泉亭留詩識别匡廬東南秀江行屢停舟紫翠遙相望塵俗不暇遊曾從風雨際默禱隂霾收兹辰炯晴旭歡携得良儔五峯鬱岧嶤鹿洞何深幽分符仰過化讀書慨前修持觴面蒼峭虛亭枕寒流清賞未云已行役寧久留山靈倘有約重來劇冥搜過西嶺憩長慶寺於經閣登眺仲月氣和淑賞心塵事牽經界祇府命追攀得時賢敢辭行役勞似結山水緣整屨登西嶺憑虛近中天百泉響空澗萬藤疊危巔倐焉嵐霧集洸然鴻濛前盤桓下飛磴迤邐見平川垂松古梵宫投裝意超然復兹陟雲構幽觀暫留連上公亭上公亭者王文正公宰平江時所遊處也澤民屢從時暇登眺兹亭念先哲之流風愧寡陋以何補徘徊感慨歌以宣懷幕阜東北峙汨江西南流君子有遺愛築亭表斯丘製錦試遐壤作霖抱嘉猷升堂走魑魅避席環蚍蜉至誠靡不感作俗良有由盛德祠百世一日同千秋宦遊忝後塵神交企前修致身誠寡要素食徒包羞遙遙墟里間盻盻凋瘵憂朂哉志康濟臨眺增綢繆三月一日修祀事于文昌祠分韻得隄字文昌拱宸極降神劍門西爵祿司砥礪賢能膺組圭宫祠宛溪上洋洋靈久棲聖皇法治古賓賢表黔黎况兹文物郡前修聨上躋祝釐尋典禮羣英幸招携芬芬奠牲膂秩秩陳醢臡利成旅酬獻肸蠁開端倪修翼起滄海長河決金隄允矣在斯舉藹藹升天梯上佟副使羣牧寄邦憲帝心念民康江左久凋瘵咨詢選才良君子感知遇誓將振頽綱雙溪方弭節列郡先飛霜髙秋厲鷹隼清風懾豺狼公餘禮下士黌序生輝光願言化成俗嵗久道彌章送張仲端經歷王政繫風紀賓僚貴儒流吾邦古藩翰多賢仰前修彬彬須城士蕭曹將與儔溫如良玉質清若寒露秋尚書有文獻奕葉承弓裘薦章藹聲華解印寧淹留矧今需才彥而當茂逺猷江程積雨涼揚帆駛輕舟雖歡懿親會能忘昏墊憂乘驄佇嘉命省俗此重遊送趙説道中臺察掾皎皎臺中妙昻昻懷令姿春華麗文采秋蘭馨言辭幽居肯來覿蔭竹灑涼颸賓賢未盡歡王程已及期鍾山尚乖闊此别况京師吾兄信時哲風裁恆自持以兹青雲器內舉孰云私案牘諒匪久羽翼徵在斯論文貴敦舊贈言敢忘規惟應厲清操揚聲慰所知送莫京甫赴南臺掾宣城古名藩贊畫得時彥溫如崑山玉清若澄江練獄辭志平反州民懷眷戀倐奉南臺檄辟此三語掾凌厲信有時夙夜期無倦遙望鍾阜雲携觴共追餞九日登敬亭西峯懷仲淵分韻得髙字佳節欣澄霽敬亭共遊遨行行逺囂塵迢迢歷巖嶅流泉盥紺碧孤松蔭蕭騷暫憩阻盤谷稍升豁江臯遇境即深賞探幽遂忘勞絶頂俯飛翼萬象明秋毫不瞰泉岫低安知此峯髙進芰雜山實採菊泛芳醪同懷悵仳别北望增鬱陶拂石留題字先登愧吾曹下嶺得陰字秋山罷遊覽回首連峯陰林廬得小憩芳樽復同斟皎月忽隨影零露巳霑襟逍遙向城闕却愁塵思侵贈江東照磨秦裕之應南臺掾史之辟昔為宛溪别十載欣重逢守官稽令甲應幕依芙蓉潔如玉壺露利若青萍鋒辟書來南臺程期豈從容目送舟遙遙雨涼江溶溶行峨惠文冠誓屏豺狼蹤素志諒能展嘉聲斯亢宗梅致和案致和字彥逺堯臣九世孫從汪澤民受春秋著類編十二卷部使者王士熙吳鐸雅重之屢辟幕不起尋卒宋濓志其墓有稿十卷燬於兵丁丑九日登城西山園分韻得路字佳節有襟期超然發竒趣登覽得崇岡咫尺西郊路雲嵐遞隱見山川歸指顧新螯雜野饌芳萸泛清酤舉杯招陵陽握手論心素却笑塵埃間終朝競馳騖擬古送施敬叔赴京都渥窪産神駒良能日千里頻年服鹽車甘與駑駘齒伯樂道逢之解佩以為質加以黃金勒絡以青絲轡燕臺屹崇崇朝發夕斯至翹首一長鳴坐使空北冀何當振長策力驅效陪驥進善旌巍巍古元聖制作何其精設旌五達衢錫以進善名回飈動旖旎晴霞絢晶熒匪直昭觀美于以通下情至人秉彞性耿耿懷忠誠臨風一遐矚鼓舞趨皇京眷彼鄭蝥弧周麾呼登城漢幟匪不華所尚唯佳兵何如進賢士相與圖太平題王昭君圗巍巍漢天子俯視單于國佳兵不祥器搆此千載隙一朝講婚好詎較秦晉匹妾本良家子來奉披香室如何薄恩情以此嫁絶域訣辭未云巳騶道若相迫行行故國逺萬里不遑息遂抵龍沙庭禮遇殊巳極穹廬以為居乳酪以為食雖貴非所安雖榮非所昵回首漢宫掖可望不可即悲哉青冢髙千年但陳迹施坦案坦字季平十月二日先妣諱日感懷呈家嚴家兄燦燦萱草花自昔居北堂傷茲本根萎一去三十霜非無同枝榮分散各異方異方難屢面追逺同所傷所傷獨何深墓下秋草黃賴有鬱者椿松柏偕蒼蒼願保貞固質嵗寒盟久長幽憂固難忘仰蔭汔可康題石埭縣胡氏問源亭幽人性樂水結構面渟泓几席湛無滓簷楹虛以明瑶波與目謀鏘鳴耳為傾豈不娛視聽於焉攄我情孰知始涓涓居然致盈盈逝川著道體觀瀾探理精悟此蒙養德有孚坎中行源澄流尚濁孰肯淆其清勗哉務敦本請事斯亭名施桐案桐字晉卿送敬亭李有成歸覲君家騎鯨仙山色看未了雲仍此焉集煙霞恣幽討東城一相遇襟抱倐傾倒相知意方新子行計復早願言襲先芬重看拾瑶草何儒行案儒行字仲景至元乙亥領浙江鄉薦擬古三首夫君天一方寄我春羅鮮裁衣以被服綷縩麗春妍朝織機中錦夕調琴上弦深閨抱幽獨暗擲桃李年緑苔生綺閣芳草積雕欄思君胡不歸嵗月坐推遷妾心冰玉潔君操諒彌堅上林翳髙樹百鳥來紛紛結巢編其柯喧啾長兒孫侵晨啄禾黍薄暮翻寒雲豈無雕與鶴搏擊難空羣悠哉丹山鳳舉翼凌紫氛猗猗蕙蘭花敷榮在巖阿采采心靡勞眷此陽春和夫君在滄海欲寄道里多音書久契闊殷念將如何紉為幽居佩嘉芬襲衣羅中閨對明月顧影空婆娑送姚道士往金陵訪玉林陳鍊師原注玉林號虛白先生麻姑翠苕蕘青松蔭泉石道人懷逺遊清嘯聞終夕身被紫霞衣山川訪仙迹金陵古形勝樓觀絢丹碧皎皎玉林子觴詠日間適得兹翛然侣清風生几席華月滿中天虛室夜生白施霖案霖字伯濟寄黃彥清正聲久微茫塵滿絲桐衣幾度思理曲擬我與世違偶逢鍾子期對之拂金徽一彈再三歎下指生光輝但憂子期去聽者亦復稀汪洊雷案洊雷字叔震疏齋賜示和陶移居詩有懷從遊之士不鄙荒陋而俎豆之輒次韻以謝不敏我家南山陬猿狖之所宅山中亦何有圗史窮日夕知巳非所任願為老聃役稍從燕遊間庶分漁樵席大雅久不作兹焉愜平昔感遇方為榮爵圭何待析髙德遊秋興灝氣日漫漫微飈日颼颼前簷木葉下巳覺人間秋美人顔如玉遙睇西南樓當軒調素琴曲終有餘愁妾夫海南隅逺泛滄浪舟三載不相見嵗月忽如流安得與之俱置身入羅浮此曲今絶耳餘響空啾啾趙由野寄謝新安曹希文天風西南來爛然雲錦章黃峯滴秀翠收拾無留藏鏗然韶濩音驚動羣鸞翔薰香再三讀浣我煙火腸先施漸未能欲報徒七襄斑衣戲庭下為引南豐香丘巨源擬大暑運金氣大暑運金氣火盛金未逮炎蒸毒我腸霑汗苦浹背夏暑民尚咨秋暑胡弗憝四時遞遷斡功成所宜退金張侈貴盛貂珥纍數代許史擅世寵第宅儷廣內滿盈不知止一跌竟何悔仲連却秦軍好爵不我愛隆隆炎赫中髙風千古在汪師賢贄龔教授蒼蒼松柏姿千嵗閲霜雪結陰干清霄况復秉竒節偉哉梁棟材那能就節棁橫經敬亭下襟珮映觿韘久知辭翰宗夙負經濟業會當快扶搖羽儀振天闕戴元素送張仲端經歷東魯有佳士佐幕東南州襟懷寒露潔藻翰春雲流儒風激頽波憲紀多良籌詳刑周列郡問俗紓民憂伊豫幸同年升沉非匹儔君子乃推薦虛薄誠所羞自憐鷁退飛空仰雕橫秋依依敬亭雲去去汶水舟且盡别離酒迹逺心綢繆許晞顔按宛雅作希賢和趙陽山招挽歌盡道順其正吾聞諸先師斷鶴豈不憂續鳬無乃悲任真各有適談天不容辭疑心春冰泮滯見秋霜晞所以存悔翁乘化任所之非道故無憂爰賦黔婁詩黔婁有仁妻正衾覆其尸吳寶先和趙陽山招挽歌江國同宦遊憶昔壯嵗時投簪各辟地間闊傷亂離坐閲滄海塵夢斷邯鄲炊君抱河汾學著書擬古遺肯甘草木腐祇重禾黍悲鹿門守苦節耆舊今其誰謇豫愧孤陋衰暮空棲遲三復甲子編撫卷為吁嘻世事固不常人生竟何為城市多紛擾林泉有幽竒伊人共歆慕何事獨嗟咨窮通等浮休達者自悟之委順付造物佚老足自怡寄傲北窗卧舒嘯東臯耔名教真樂地何憂復何疑天未喪斯文文其不在兹請輟楚人些載歌盤谷詩梅奕芳和趙陽山招挽歌飄飄華陽翁耿耿貞元士挺挺梁棟材軒軒雲霄志當年掇科名聊復試仙吏天將厚公德所以薄其位晉鄙日薰陶風俗日以美東籬時寄傲采菊香旖旎引年未可學况學長不死信史藏名山居然學者師既見心則悅未見我心悲誅姦發潛德視此瓊瑰辭岐山鳳一鳴覽德朝日輝胡為達生死哀挽預擬之政使百嵗後招魂但歌詩毋為效俗子作樂娛其尸方炳炎和趙陽山招挽歌景陽一角麟城南老文士苦詩韜丹心甘隱暴素志曲江看花仙東陵種瓜吏時事若罔知由不在其位一編紬石室吾聞其語矣顧巳持髠髦從人作髙髻宗婦不再適失節大於死陳巨源和趙陽山招挽歌有生必有死此理自古然吁嗟世之人孰不埋荒阡夀命非松喬誰能保百年羲娥逝不留寒水尋相煎氣散則形返知者何待言知者何待言不作兒女憐一朝倘乘化聊以警世緣黃庭芝和趙陽山招挽歌人生胡為哉聲迹兩茫然視昔少壯時驅車東西阡天地有終極事業無窮年膠膠復擾擾百慮來相煎今兹老頭顱一笑已忘言一笑巳忘言白髮漫垂憐何當招山靈藏密謝世緣張元璹次趙陽山招挽歌韻二首有生必有死殆猶旦暮然及兹未死時西陌而東阡風日撰杖屢優遊樂餘年心茍為形役膏火自烹煎浮生真如寄難與俗子言難與俗子言汩汩誠可憐榮悴各有時修短信前緣淵明百世士曠達真可師委運大化中不喜寧復悲而自擬挽歌毋乃空費辭風花匪耐久草露旋即晞轉盻成陳迹皇皇欲何之放懷薄薄酒遣興草草詩至人有達觀虆梩掩其尸附五言古詩按永樂大典內凡係失名失題無考者附後首夏讀謝康樂詩首夏屬佳月景靜淡無營獨此焚香坐何以寫我情慕謝方婉孌臨文乃縱橫甘如酌玉醴馥若佩蘭英山水信可賞符竹亦非輕無悶未云悟惜哉稱達生九日賦菊冉冉九秋暮靡靡百卉腓凄風振中林零落霑我衣令節依辰至黃華靚幽姿清妍謝浮艷淡味涵華滋彼美南楚士餐英湘水湄亦有彭澤翁薄言採東籬前修不可作遡風邈豫思晚成自遲鈍春芳實先萎迅商薄玄髮撫景嗟願違誓將掇靈草紉佩芳菲菲送李仲傑僉事任滿歸吳鳳麟瑞昭代雕鶚橫清秋英英青雲器逢時展嘉猷冠豸登憲府馳軺遍南州粵從江東來賢勞四年留春陽煦凋瘵氷霜厲清修氓里正懷德拂衣還虎丘執别弭行棹東風渙春流會當被嘉命簪筆侍宸旒哀三良詩并序秦風有哀三良詩刺穆公以人從死後王粲作哀三良者興曹公以己事殺賢良也陳思王亦作之者怨巳不及死者也吾以哀三良仍有餘意猶可賦詩故復作焉士為知己死女為悅己容咄嗟彼三良殺身徇穆公丹青懷信誓夙昔哀樂同人命要有訖奈何愛厥躬國人悲且歌黃鳥存古風死復不食言生寧廢其忠存為百夫防逝為萬鬼雄豈與小丈夫事君繆始終郊行言志明發出東郊輕雲斂微晴新雨動膏脈羣物咸欣榮緩轡吟且行滿襟春意生豐穰啓嘉兆田里安疲氓從政無竒術素飱慚不耕惟持貞白志庶用答休明村民潘氏婦安貧守志作詩美之門前霣枯桐門外繄荒草閭巷鎖秋風啾啁空雀噪居人夸且説嫠婦髮未縞艱難務紡織糲飯雜枯麨生子才稚童訓以事秸藁之死堅自誓老矣逼華皓夫人孰無志所慕伯姫操長貧一不忍嵗寒那可保吁爾寡聞識林深蘭自好惜無彤史筆特使貞德耀我歌邶鄘風以備采詩討妾薄命當時結髮誓敬許以身從舊來繡羅襦尚有雙芙蓉顔色日以故芳年安得重身殉豈所難曰禮恐未恭凄涼夜來月耿耿照房櫳丙子嵗冬自陜移守長沙過石城子壻种主簿女組各以詩見送為作雜言以酬之少壯寡略謀妄意學干祿中年飽憂患未能辭寵辱有如隨陽鳥又似籠中鵠日日謀稻粱卒嵗難充腹今朝楚江上邂逅見骨肉逺道巳足悲况復念鞠育平生懷抱物一旦隔川陸女兄佐翼城女妹客代北今我出三湘别女郢水曲相望各萬里音問難頻屬匆匆逆旅間夜闌更秉燭無言對酒食忍淚聽絲竹别恨各填膺欲語不能告却憶長安時畢世恐難復良人負材業下位恥自鬻家貧復親老兒女坐滿目儻不從仕宦無以繼饘粥我老猶強健我逺忝方國在我不足憂於女可無囑慎疾避燥濕甘貧樂菽粟大有富貴人憂危多不足家問茍無故便是康寧福鳴騶巳在門冬日苦短促倚馬報此言甚愧非珠玉丙辰嵗人日與胡彥德登敬亭第一峯得登雲二字發春想髙賞危峯正崚嶒歡攜得時彥攀雲乃先登丹梯照白日振步何飛騰攜觴侑珍脆罃火然薪蒸遇勝輒留憩曠然襟抱澄美人隔煙霧佳興何由乘長嘯坐髙頂超然遺世紛空濛接海氣縹眇瞻湘雲鈞天諒匪遙仙樂時一聞衆嶺鬱可玩兹峯迥難羣靈芽採初緑瓊葩獻竒芬原注時茶巳芽香草吐花如玉欣賞遂心素慕謝垂斯文丙寅嵗人日又與胡彥德登敬亭第一峯得即丹二字丹梯倚碧霄獻嵗更登陟騰笑縹眇間揮手凌八極仙葩如玉人顔色溫可即芳醅泛羣蟻珍味羞九肋烹泉火出瑩題石蘚漬墨李謝去巳久使我空歎息終日挹髙風斯意誰能識飛眺紫霞表長吟坐天壇川光混逺碧海色明微瀾巖日正照耀松風生雨寒披襟納萬象心與天地寬仙人駕黃鶴飄飄在雲端欣然一相接授我龍虎丹從此換凡骨髙舉成羽翰悼亡陰陽麗懸象夫婦正其常易重咸感義禮垂親迎章惜哉此道堙千載何茫茫我嘗振頽俗委禽導南翔所賴婉娩姿承宗奉姑嫜貞操永自持冰玉照耿光淑德諒有容蘭蕙含芬芳明珠忽墮手千金亦垂堂復此孤鳳飛哀鳴求其凰眷然息嘉樹藹藹孫枝長題薛夫人馬氏死節卷後國初時彰德薛氏婦馬香既適薛而香母復奪之將改適焉香義弗辱而重違命乃自沉于井時人哀之至堅不為磷純白不受緇幽幽秉貞女苦行良可哀結髮事君子翼翼崇令儀歡愛未渠央中道忽乖違破鏡不復圓孤鸞有餘悲誓將百嵗後夜臺可同歸一身不再醮一冠止雙緌天胡不諒人石轉心不移衷情竟誰語徑節終自持身落井底泉魂逐秋雲飛聖朝重名節王化實所基誰能采遺風上奏白玉墀肅肅昭令德煌煌表清輝淳風諒能返何庸嘆澆漓失題芳洲亦云夕薄言擷蘭荃悠悠無與贈脈脈空自憐美人洵且都為加一笑嫣知己古所重欲報日縻捐未省婉娩姿可復成春妍悲哉爨下桐猶為朱絲絃
