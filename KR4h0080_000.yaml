body:
  text: 提要宛陵羣英集十二卷總集類臣等謹案宛陵羣英集十二卷元汪澤民張師愚同編澤民字叔志婺源人延祐戊午進士授承事郎同知嶽州路平江州事歷南安信州兩總管府推官以母憂歸服除補平江路總管府推官調濟寧路兖州知州至正三年召為國子司業與修三史書成遷集賢直學士尋以禮部尚書致仕居宣城自號堪老真逸十五年長槍賊陷寧國被執不屈罵賊死年七十贈江浙行中書省左丞追封譙國郡公諡文節師愚字仲愚寧國人曽兩領延祐天歷鄉薦與澤民友善江南通志稱其嘗撰梅堯臣年譜然年譜乃其弟師曽所撰已别著録以為師愚者悮也是編蓋澤民晚居宣城時所輯上自宋初下迄元代得詩一千三百九十三首分古今體訂為二十八卷同里施璇為鋟板以行其後久佚不傳故寧國宣城二志載籍門內均不著其目今核永樂大典各韻內所録此集之詩共得七百四十六首作者一百二十九人視原本猶存十之五六中如王圭等七十餘人載於宣城舊志文苑傳者其遺編往往藉此以見又如梅鼎祚宛雅所録諸家佚句以為原詩散亡者今其全什亦多見集中宋元著作放失者多此集雖僅一鄉歌詠亦可云文獻之徵矣謹裒集校定釐為十二卷凡其人之爵里事蹟有可考者俱補注於姓名之下不可考者闕之其永樂大典原本失載人名無可參補者則仍分類附録於後以待審訂焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序詩所以咏情性而夲乎風教之盛衰其體固有古近之殊求之六義一也宛陵為江左大藩文風之盛蓋久矣世逺而辭不傳宋太平興國中少卿李公以文學顯繼而侍讀梅公以詩名當世搜訪所作皆僅餘數篇侍讀從子都官聖俞則尤大昭著者幸其集獨存學宫嵗月寖深後之篇詠益復放失可不惜哉里中施璇明叔昆弟敦尚文墨乃請于余偕張仲淵編輯李少卿而下詩逮乎今日凡得一千三百九十三首分古今體繕寫為二十八卷題曰宛陵羣英集鋟板而傳之都官詩則不復載焉余嘗怪世之昧者往往易視乎詩不知其關政教非小也是故風雅之作媺惡具存感發懲創並行不悖今是編雖不越乎宛陵然一邦之政教得失于焉可考矣采詩者覽之亦將有所取云至正初元嵗在辛巳正月丙子新安汪澤民序宛陵山水之勝聞於東南人生其間必有魁竒秀偉之士發于咏歌亦必清麗典雅播當時而傳後世由宋以來有少卿李公侍讀梅公公之姪都官先生洎施景仁周少隱諸人彬彬彰甚余嘗欲萃輯衆作而因循不暇一日里人施璇明叔率諸弟來請曰吾宣詩人之集不少年代浸逺散涣無統淪亡者衆矣今不輯懼久而益泯使後世無聞焉非所以尊先達勵後進願子輯諸家之長為一編吾將刻之梓以久其傳豈不偉歟余固辭不獲乃與吾友汪氏叔志上取宋初逮于今日凡宣之士所作諸體詩摘其警䇿者類分而臚列之凡二十八卷名曰宛陵羣英集都官詩則有宛陵先生集刻夲于學宫茲不復載若夫采録未盡及繼今有作將俟續刋之云至正元年嵗在辛巳春正月丙子宣城張師愚叙
