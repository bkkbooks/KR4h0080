body:
  text: 宛陵羣英集巻四元汪澤民張師愚同編古體七言元吳鍈有之老師下過留宿龜峯之西結茅屋南岡先生夜投宿開門出迎喜欲舞童子烹雞酒新漉别來三月意傾倒自言豸冠相遇好披圗見畫復見詩筆法逺過東岩老燈前細酌尊易空僻居甚媿無鮮醲連牀醉卧不知曉覺來山寺鳴霜鐘再用有之老師韻以謝黄昏炊煙起鄰屋獨樹槎枒鳥爭宿新醅香動喜客來螘泛蛆浮不須漉獻酬交處玉山倒燈火頻開爲詩好勸君適興須盡歡昨日朱顔今日老書囊無底非談空令人心醉如醉醲他年佳話起今夕應笑寸莛撞巨鐘汪士明案士明字公亮士深之弟題四御史詩巻上元甲子龍飛春一時羣賢輔聖人四聰甚邇百度舉誕降絲綸旌直臣直臣維何四御史鐵冠白筆侍紫宸面如秋霜膽如石曽犯先朝批逆鱗奏章上徹雷霆震此身視死猶埃塵寛饒竟到北闕下韓公逺謫辭西秦忠言嘉謨倘悟主小臣㣲軀安足云鷙鳥既死不復擊尺蠖暫屈當復伸忽逢天語爲昭雪一朝黯淡開青旻死者當廟食子孫居要津生者賜環歸朝廷領縉紳彼哉患得復患失重茵列鼎思全身回視四賢生死各盡節何異鷄驚爭食仰視鸞鳳凌紫氛汪澤民余幼有山中讀書之志因循弗暇一日同仲淵昆弟行尋其所去西城七里敬亭之下莽蒼之中岡巒迴抱未遂卜築窮年矻矻厭城郭避地久憶山中樂山中之樂人得知潛魚在沼林巢鶴西城七里敬亭陽岡巒星拱泉甘香桑麻雞犬接人境幽尋似入武陵鄉卜居雖無買田具因髙面勢心相當平生畏友得二張髫年此志終不忘要令六經心炯炯坐恐兩鬢成蒼蒼安豐董邵南鹿門龎德公䇿我駑馬逺追髙風噫我非斯人誰適從八月十七日同遊敬亭得並字湘中三年夢鄉井敬亭重遊心目醒雙流夾鏡一溪來千仭齊雲兩峯並叢祠秋報同奠桂蘭若晚酣催煮茗晴嵐暖翠約花時徃覔丹梯登絶頂施琪案琪字永叔饒州路初菴書院山長遊徑山寺迢迢雙徑躋層峯層峯髙削青芙蓉嵐光掩映翠欲滴夜半見日扶桑紅梵宫去天不盈尺樓閣崢嶸炫金碧天香清徹旃檀林井泉寒鎖蛟龍宅烟霞欲曙撞華鐘數千食指如雲從塵埃不到清淨界誰能面壁參真空我來游觀春已老緑隂靜晝留芳草盤桓絶頂俯人間超然便覺乾坤小開襟久坐松竹隂不知山外斜陽沉西牕夜宿夢魂冷白雲流水皆知音山僧杯酒勤留客白飯香芹薦芳席明朝興盡下山去回首青山雨相憶侯賔于案賔于字廷美官廣束憲使送張漢英之金陵平生不願爲傭書亦不願作章句儒酒酣詩成吐素霓意氣凛凛呑千夫去年排雲呌閶闔出門一夜車四角年年踰嶠席未温一舸乗潮又催發大江之西日本東廬陵人物常稱雄决科嵗占十八九君當努力揚詞鋒才髙不用長歎息四海彌天豈無識壯年懐居亦何有着眼帶礪開胸臆霜臺屹屹凌髙寒豪士傾盖宜交歡我知屠龍不屠豨食馬正欲食馬肝吴姬壓酒吹香絮謫仙神遊歌白紵敬亭惟有孤雲閒欲雨人間亦飛去梅致和題獨馬圗西域之西生良馬丹青何年入圗畫良工不必問誰何只此毫鋒便瀟灑肉騣汗血形如龍權竒骨與駑駘同逈然獨立生長風自信不受金羈籠老驥猶能志千里况此昻頭渴烏勢聖朝捐金市駿骨宜向天閑驂六轡夜宿三浯溪晨登摩崖山山下有鏡石以水沃之可照見此地山水征帆夜渡三浯溪隱隱巖石瀕穹堤舟人指㸃有石刻廼知此是摩崖碑平生自負山水癖况復此地成幽期停舟擁衣坐待旦霜氣慄烈侵人肌誰家吚喔靈雞啼落月半壁沉天西攀蘿陟磴尋幽蹊拂霜細讀中興詩字畫千古存勁氣筆力一代稱雄辭後來山谷賦長什音韻激烈復何悲上凌絶頂倚霄漢下瞰萬頃浮晴漪土花剥蝕崖壁古鏡石照映山川竒窪樽一盃涵積雪老樹百尺懸樛枝鏗鍧林谷互響答疑有神物來護持登臨興濃不忍去一聲長嘯江雲低次韻舅氏登新安四面山新安隴上松栢青峯巒拱揖四面屏雲來一派衍宣郡惟我舅氏明麟經少年飄飄鸞鳳志便欲奮翼凌滄溟自從姓名登桂籍居官亷潔門常扃歸來坐席不暇暖籃輿以次謁墓亭北登峽石西涉涇履霜披霧仍戴星世間何物能報本只有孝行通神靈新安不逺數百里足力雖倦何敢寜登髙强飲菊花酒醉者自醉醒者醒祖龍一朝賴公復應與天地終遐齡良弓行秦王英武擒黑闥玉帳鳴絃不虚發由來克敵在良弓豈問烏號與繁弱材幹堅良膠漆固圓穹宣精列躔度兩端骨弭亦光澤虬嚙重淵挾中弣東征西討良汝資用之則安舍則危發硎金鏃霜入楛急絃送羽髙横飛將軍貝胄五花馬十年講武長城下振旅歸來獻功績玈矢彤弓自天錫何儒行丹霞篇寄冲妙觀道友麻姑諸峯插修翠麻姑仙人鳴玉佩中有道人餌丹霞採术餐芝鍊元氣昔年我曽遊蒼崖碧樹烟雲秋烟雲秋仙壇石老苔花幽尋觀怪石獅子踞石屋落日𤣥猿愁𤣥猿愁白鶴舞相携乗風凌紫霧琳宫丹闕摩太清下視人寰隔風雨丹秘金爐深劒藏石匣古揮手接髙真飄飄已遐舉道人笑掬山下泉竹房茶竈揺輕烟天游之亭據幽勝玉堂寶翰何清妍却登齊雲閣持觴勸明月明月滿山風滿林醉來清夢欲飛越我無負郭田我無買山錢一邱一壑道人肯乞與便須冩我丹霞篇胡師寅題淵明愛菊圗淵明思歸今已歸絃歌莫辦三徑資王𢎞畧有丈夫氣可憐督郵真小兒彭城寄奴狂未死蔣陵風物寒如水淒涼吟斷義熙前自傍晴牕書甲子秋風滿地揺黄花脱巾漉酒夕陽斜揩摩醉眼看天地南山一㸃如栖鴉人間畫史眞狡獪逸氣英風長自在東籬晚節香更濃不但淵明吾亦愛題和靖愛梅圗孤山孤處詩人廬西湖烟景光模糊生來不識軒冕貴自愛野趣情怡愉種花不種閒桃李賸種寒梅照清泚一簾春色動壺觴萬株玉雪揺書几暗香入夢吟魂清浩歌出户青峯横車騎紛紛倦迎送應怪野鶴來飛鳴吳兒不記先生語舊日祠堂漫無主梅花老盡紫苔空只有湖船載歌舞施霖夀家君山齋閉門春晝長黄庭一巻添爐香長孫誦聲差琅琅幼孫啼聲更喤喤桐枝演迤日以昌兒曹豚犬森鴈行大兒無聞壯且强抱材空疎志荒唐應門賴有二季良家風儒儉循吾常彌年麤糲無膏粱斑衣庭前持一觴容顔半老鬚眉蒼四時禮缺定省荒不辭衣食走四方幸有形影相扶將不願腰金爛輝光願翁千年樂夀康劉得之送酈肖梅歸三茅山玉晨宮三茅峯髙不可躋茅君携雲作丹梯棄官應同棄弊屣爛煑白石甘如飴世路紅塵有何好萬塚北邙蓬繞繞茅君去漢二千年長向山中拾瑶草我無丹砂堪蜕肉骨凡枉住麻姑琴髙兩峯間便欲凌空借鶴歸茅山茅君丹井知何處煩君指㸃雲間路脱我破鹿裘笑拂紫烟去預借金陵道上泉淨洗黄塵兩芒屨題松下老人圗原註建平王宰持此獻貢南漪古松蒼髯枝屈鐵失笑相驚在巖穴老翁手持緑玉杖獨立西風雙鬢雪翛然野服山家容平生我亦懐髙風彭澤歸來入圗畫真有人間靖節翁原註李伯時亦曽畫松下淵明圖劉鑄案鑄字禹鼎有慶之子舉至治辛酉進士歴安慶路推官知南豐州多忠政工詩題髙彦敬尚書畫山水圗憶昔東走吳越間杖藜所過皆名山扁舟無端復西上巫峽照眼青螺盤五年塵埃卧環堵慨想昔游良自許偶然圗畫見崢嶸似與故人成晤語逺山屹翠近山重白雲漲谷烟濛濛平林雅淡見秋色蒼崖古木蟠虬龍溪迴林紛山路足林下何人結茅屋小橋野逕寂無人依約山翁清睡熟鵝溪一幅君家珍尚書妙與元暉鄰驪黄牝牡皆神駿誰謂水墨殊丹青平生愛山仍愛畫畫裏看山天所借此身此畫兩俱亡孰與莊周同蝶化汪琛道中即事龎公不肯入城郭幼輿只好著巖壑竹舉多事呼出山紅葉蒼煙滿林薄天長雲影冩鴻鴈水落沙汀行郭索故山禾黍秋離離社甕欲香雞可縛吳復興送賈憲使赴中書郎中仙官夙製芙蓉裳爲乗白鹿來江鄉江鄉水淺不可駐却眺薇垣歸帝傍薇垣庶政如蝟積破竹持衡需左掖上報英主開太和下副蒼生奠蘇息臯䕫接武登清朝羣公鼎鼐公能調就中吐握在所急詎肯詢采遺芻蕘江水東來豈云淺中有鯨魚逢蝘蜓願公咳唾轉陽春老驥尚堪千里逺題四御史詩煌煌明光宫螭頭惟御史諫諍乃其職安用論生死二人同心可斷金何况四人同一心封章政有回天力豈料白日愁雲隂雷霆震擊無不裂豈料分爲生死别極知臣罪固當誅豈料恩波爲昭雪吁嗟徃事無復云但逢芹曝思獻君休言折翼不再舉到底薑桂彌芳辛死者已爲逢與比不作曹蜍泉下鬼生者常笑仗下立誰能孤負南牀食髙德夀相逢行與君相逢江之干朱亭翠栁扶金鞍風塵今日是何日對面千里生悲歡江聲瀟瀟江水緑江上晴山削青玉珠絡銀壺傾美酒爲君緩緩歌一曲歌一曲君且聴人生何止如浮萍萍飄東西有定所人生不得須臾停勸君飲爲君歌當歌不飲君奈何百年憂患常居多君看長江水日夜相催亦如此前波未收後波起世路無如醉鄉好富貴令人頭白早髙德游長歌行送王仲儀學正歸新安原註時仲儀下第酌君以萬斛玻瓈船君言不如名山大川窮鎪鐫贈君以九節珊瑚鞭君言不如清風明月不用錢新安山水天下壯形勢突兀隔雲烟上有摩空之層巔下有瀑布之飛泉儲精毓秀自太古真元㑹合生大賢六經啟秘四書出孔道日月行中天聞風百世尚興起况居桑梓親磨研皇元太平四十年車書混一同中邉興賢有詔表朱學文體一變無頗偏徃年鶴書上天府二十八宿如珠連我時材疎偶見黜坐看公等如昇仙禮闈擢秀惜不與念子健筆空如椽天將有意降大任故使窮困志益堅大鵬南翔息六月長鯨東去吸百川新生桂枝儘堪折舊傳楊葉亦可穿要須明經拾青紫且共苦學攻丹鉛天門射䇿誰第一大明殿上聽臚傳趙由埜詠朱買臣擔樵結食行歌書不治産業貧哉儒妻羞求去翁笑謂五十富貴當須吾妻怒謂翁餓死耳翻然見棄翁從渠視彼王章真有愧乃知世間賢婦絶少紛紛愚上書長安嚴子薦帝悦拜爲中大夫一朝富貴妻愧死髙車駟馬還官吳有恩皆報快志願故人召見良歡娛受詔將兵復奮武擊破東越功尤殊九卿列位顯已足於斯時退何榮如孳孳貪進且不已直待華髮身遭誅翁子預知富貴固亦異胡不預卜全其軀當時貧賤思富貴富貴不履危機絶世無汪眞贈羽士陳静山彈琴琅然太古音出自羽人手如寫三峽濤浣我塵數斗神仙中人不易逢聽君古調含僊風瓊瑶雜佩騎飛龍翩然夜下蓬萊宫緑雲揺波江渺渺楚天平逺蒼梧小神僊神僊歸去來一聲唳鶴青山曉張商巖挽江梅山天地萬物難齊名梅花獨與山俱清寒梅不彫傲霜雪青山不老亘古今偉哉君澤逸世士倦止梅山築新址平生心事惟愛梅不數漫山俗桃李吁嗟行年適在辰角聲吹斷羅浮春梅花香銷山亦傾月明何處招詩魂梅奕芳送王月溪提㸃南歸清溪月清溪月不受纎塵迥竒絶天宇泰定長虚明豈問隂晴與圗缺清光一輪同古今北照燕冀南吳越前年馳騎入京城金臺露坐詩思清今日扁舟還浙右西湖延賞傳金觥東來孤鶴横江起明月在天天映水南樓一夜倍思君舉頭見月人千里對月痛飲須髙歌百年離合何其多附七言古詩按永樂大典内凡係失名失題無考者附後四禽言代江湖逺客遣懐不如歸去不如歸去錦城還憶來時路他鄉寒食故鄉心去住兩難春又暮行不得也哥哥行不得也哥哥荆湘衡岳春雨多驅車上阪復下阪奈此黄泥沒膝何脱却破袴脱却破袴燈前刀尺閨中婦十年爲客弊貂裘短布單衣雙骭露提壺盧提壺盧花前有酒君當沽二十辭家歎薄命舟行陸走交荆吳人生得飲且自飲莫待霜雪盈頭顱釋悶燕丹未歸馬未角卞子抱玉無兩脚孤城食盡兵未却度笮中懐挂一索我輩於此酒宜酌百嵗千秋奈何樂贈刻章者我家秃筆堆平牆雕蟲小伎長荒唐君懷寸鐵妙勝筆鳳綰鸞翔龍起蟄偃波垂露狀萬千薤葉横披科斗拳世間刻楮非天全鼻端斵堊人孰傳内府石渠時夢見圗書漆竹光摩天陳倉石鼓霧雨濺嶧山棗木肥失妍唐鐘漢鼎知幾年尤物竟與乾坤遷集古無人寶晉逺滄江望斷貫月船金根伏臘謬分别腰下政用疊疊懸君不聞兩石弓一丁字是非付與東流水眼中之人今老矣新橋詩宛水南來㵼寒碧馳繞城扄襟抱隔陽侯奰怒舟或傾六月洪流幾哀溺使君爲政知所務興作飛梁水晶域鑿山累址砥柱牢輓木梯空蜃樓立朱甍雲氣時吹嘘藻井漣漪相蕩射西城東市連賈區越柁楚帆來逺客常時褰裳泥拍膝忽看揮袂平如席雨止風收練如織長虹截斷秋光白結搆去天知幾尺凭欄下視星斗濕不須更駕海上槎飄然欲問支機石山鹿忽至庭下捕之不獲前山花樹濃如煙後山風清鳴乳泉荆扉半扄人語靜野鹿何事來庭邊人言此物仙吏曹世間處處堪嬉遨縠紋竪攢蒼玉角雪花亂簇黄金毛縱神逸態何敏速歘忽驚飛如過鏃脱身已入碧雲鄉野虞畋犬空馳逐嗚呼古來鳳鳥何嘗棲藤蘿麒麟騶虞無網羅山芩葉短幽蘭多鹿兮鹿兮奈若何贈黎東山黎東山山澤癯挂冠卜築郎官湖十年重見霜滿鬚手持鉅編粲驪珠謂言匡廬兩遊娛右挾金輪左香爐雲間五老相招呼牽蘿躡石升天衢銀河翻落寒巖陬驂鸞跨鶴疑有無遐瞰八表在斯須黎東山大丈夫風期固與常人殊畏途聲利爭馳驅汩沒坐遣朱顔枯誰似東山超然髙世道自腴我知物外真良圗未脱塵網不得俱山靈有約焉可誣酌泉一酹陶與朱巢雲倘許山之隅省掾楊善甫孝養其母母冬月欲蕈求之不得忽得之楮木人以爲孝感所致紫薇花省紅蓮賔有禄足養白髮親金盤豈無鯉魚尾綺食亦有猩猩唇母心欲嘗黄耳蕈兒啼徃訴霜楮身枯枿頓發空山春萬釘鱗鱗色勝銀升堂一笑奉珍味白鵝截掌鱉解裙楊君事親心最純孝行有感天應聞孟家冬笋堪擬倫作詩紀實追前芬友人張仲淵汪叔志皆有山居之志因作此詩張家仲叔吾所畏仲也多才秀而美攻書惟愛王右軍作詩苦似陳無已叔兮年少尤竒絶雄辯髙談霏玉屑句中有眼字有骨下筆飄然思超越汪生疎俊氣吐虹清新敏㨗語更工揮毫對客立可就人言一字千金同文章筆墨未足論三千正在希軻雄忍貧苦節不畏謗要持古道變頽風平生取友得三益㝠棲竟欲歸山中何當採芝與爾尋黄綺一邱一壑長相從伯兄容菴公既復諸先壟饒歙間至元再元之之四年上冡立石修祠致祭遂登山采菊賦詩紀勝歸以示予謹次嚴韻以述先德並言吾兄培埴松楸之偉績焉越國忠武懸丹青巍巍著望齊花屏少卿内翰皆間出雄文大冊天緯經科名十世聨簪纓魚龍萬里開滄溟綿綿忠孝繩祖武一一俊乂排天扄伯氏感慨追前人秋風灑淚沾恩亭松楸培埴四十載寸心炯炯昭日星由來一念關蒼㝠况復純孝通神靈豐碑紀載土田復烝嘗徧舉魂其寜爰登四面展遐眺枯崖朽木皆爲醒華觴引滿澆磈磊毫端秀句垂千齡舅氏既復先壟且有事於松楸既而九日登四面山有詩以記嵗月謹次韻秋晴四面峯巒青烟霞作圗翠作屏龍溪後人我舅氏新安此地凡幾經邱壑胸中納雲夢波濤筆底驅滄溟宦游侯藩志已顯歸來故里門常扄宅前鼇頭枕宛水樓外山色迎昭亭科第蟬聨紹光禄文華煒燁曕婺星古今百行孝爲本天地萬物人爲靈十世松楸一朝復九原衣冠千古寜重陽採菊共登眺羣從簪萸同醉醒遥知持觴爲公祝錫類錫𦙍綿修齡
