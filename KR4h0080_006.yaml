body:
  text: 宛陵羣英集卷六元汪澤民張師愚同編今體五言律元張師魯題劉氏嘉秀園我愛劉氏園緩步尋芳蹊晚桃弄碧色春桂生丹荑茶鼎雨聲沸酒壺禽語提欣然一笑賞有句為君題送胡夀卿之歙縣吾憶新安路溪明山更竒半開金菡蓞不捲翠漣漪耕織鄉無盜絃歌縣有師此行真得意觸目是新詩九日登西岡節物何瀟灑登髙引興賒臨風整烏帽隨意插黃花形勝連三楚乾坤合一家平生多感慨長嘯對飛霞送胡彥德之于湖之子方英妙携書亦壯逰家聲仰安定詩律喜蘇州野臘經秋日江鮮入甕油慈闈調膳後永錫及吾儔挽敬仲王徴君南國成清隱髙風與世殊霜筠半山宅煙樹輞川圖杯酒哦新句衣冠肖故吾所嗟鴻鴈盡拭目在嬌雛送吳子彥宰辰溪丞相忠言在郎官世胄華地偏須卯酒心淡養辰砂荒服無論逺皇風孰有涯鳴琴何所樂稼穡與桑麻别墅偶成報道新醪熟持杯紫翠邉樹雞吳味勝穀犬蜀烹鮮習靜來塵外遊情到物先此時忘世慮岸幘付陶然莫怪園池小聊舒逺世蹤人情驚寵辱我意樂踈慵瓜蔓垂青鼠蓮房仰翠蜂偶來參萬里一笑孰豫從野服無塵染林隂浣晚涼山杯凝茗雪水葉藉菱黃香脆堪清暑風流勝舉觴翛然真自得何必論行藏南國秋風老吾人髮亦疏霜崖依繡樹石澗漾青魚膾玉思垂釣堆紅可學書何當結幽伴來此託茨居野老欣相見山盤獻所宜賽田分社䐣報祖粉秋餈風味猶存古農談亦少欺居然有淳意榮辱未嘗知原注吾鄉以所烹牛羊豕肉和之血中為盤餐他州所未見也往往見嘲笑於逺人無有解之者余閲玉篇有字為䐣者音與損同謂熟肉內血中和也然則其來尚矣粉餈見周官題耕緑亭謝朓髙齋外誰知此亦竒一川藏罨畫衆岫列罘罳野緑耕初起林紅種未遲河陽新政績風俗尚堪為凌希惠挽孫子善教授耆舊凋零盡臨文獨泫然春風何遜筆白髮鄭虔氊幾蠟尋山屐空回載酒船平生知己在銘筆看如椽吳鍈象山書院即事我本閩中客因人得勝逰泉聲晴亦雨山氣夏先秋舊友能青眼新知豈白頭開懷盡樽俎更為月岩留汪士深題劉氏嘉秀園行過雙橋路尋春到小園雨香林下屐花影席間尊託興惟泉石流芳到子孫非君能愛客風月更誰論汪澤民東郊荇葉田田紫芹芽寸寸黃川平散鵝鴨草短見牛羊宇宙心猶壯丘園迹未忘長年懶是癖何日醉為鄉送李學甫宰臨湘君去臨湘縣江帆幾日程應知小民困屬望長官清晴晝萱花好春風棣萼榮亨衢方接武消息佇佳聲懷三天昔逰石洞禪師室招提劫火灰泉流龍尾曲山勢燕巢開結搆雄金地題名破緑苔春風吹夢逺紀勝愧無才清明日喜晴原注是日聞鵑旅寓連雲麓無眠遲曉晴暮春逢甲子芳節屬清明宇宙涵生意耕桑樂太平啼鵑何事切馬鬛故鄉情送番陽楊明仲山長任閩中巡檢章甫寧淹久嚴裝職警巡賔鴻到彭蠡匹馬向甌閩吏卒櫜弓矢門庭接縉紳會當升館閣髙步有通津送海北憲使海康隆憲府曹掾簡清忠問俗通黎語憂民卜颶風辟書催棹發行李任囊空勿憚南程逺升臺計日功遊龍興寺和綦母潛著作韻古寺依城市幽尋一扣扉劫餘房相石世授祖師衣原注寺有唐碑房相國製文徐挹古八分書又有屈眴布二十五條太衣宋紹興然上人所受于祖師者蓋南渡以前物也金像爐煙暗祗園樹影微囂塵暫時逺闤闠馬如飛長埧渡長埧臨津口狂風晚雨斜石苔粘緑髮河栁吐紅牙鳴櫓驚沙鳥回舟激浪花樂飢寧飲水解渴漫思茶挽梅叔章壯嵗上京都遊楊得舊儒承家宛陵集積慶老萊圖原注梅有母在宰邑曾馴雉休官擬鱠鱸新阡敬亭北愁絶白雲孤寄浙西張亷訪今代皇華使張綱德業優弓刀間上將旌節按諸侯強禦成擒虎髙才善解牛遙憐浙江水不向宛溪流昔獻明經策因知侍御賢陳蕃能解榻文舉乃忘年花栁春城外湖山玉節前觀風應有作莫惜野人傳送陳公輔采石山長磯伏金牛異峰攢翠黛雙同逰懷絶景相望只鄰邦春鮆宜供酒靈犀莫照江此行應最樂山水在書窗汪用敬案用敬字彥恭澤民長子過畢沖夜宿琴溪鋪朝行柿木坊青峰照殘月紅樹染新霜漸喜城闉近何愁道路長龎山重回首安得繼餘芳施琪和麻姑道士姚子純韻野岸相逢處臨風共聽泉長江無盡日喬木不知年祕術窺丹籙間情寄素絃煙霞發天趣酬唱每流連梅致和次叔章兄間居韻倦作繁陽宰幡然解篆歸行藏隨所寓迎送近來稀荒徑存松菊南山有蕨薇行年踰七十猶著老萊衣小閣臨池構公來日捲簾景多吟未遍山好看無厭祇益耽書卷寧須問酒簾朋來誰報似乾鵲在晴簷緑隂滿地上門徑亦幽哉問字人頻至催租吏不來藝編香滿架桑落碧浮杯雅愛敬亭好軒窗頻為開結宇依黌舍開軒對玉山髮從明鏡老心與白雲間頗逹窮通命能參善惡關難兄同我趣風雨屋三間贄蒙古御史人物科場俊才華命世雄自從峩黑豸誰不避青驄德澤蘇民瘼勳名逹帝聰觀風到江左春意藹芹宫題問源亭為甚清如許山中有活源暗通蒼石竇冷潄白雲根瓢飲塵心靜川流道體存築亭當此匯終日看潺湲施坦孟冬過劉氏園蠟屐乘間日芳園適趣時亂聲秋樹葉寒色晚花枝客裏無遺景年華輒入詩優哉聊復爾何用歎棲遲和梅叔章間居彭澤歸來後門前栁五株心間四時樂塵纍一毫無香結幽蘭佩詩裁明月珠襟懷任曠逹寧肯類拘儒何儒行三月二日往硤石歸訪書堂寺匹馬昭亭路東風日未斜要尋丞相迹來訪野僧家古徑多芳草幽巖半落花甘泉一甌冷和醉潄煙霞劉得之琴髙峰怪石清溪上荒臺劫火餘風簾桑落酒春網藥渣魚笋嫩和煙劚畬新帶雨鋤玉堂人不見花竹亦蕭踈逰西湖勝地流連久西湖得再逰芰荷圍畫舫楊栁護紅樓風月蘇堤夜煙雲葛嶺秋買鮮沽美酒且莫計觥籌貢師泰案師泰字泰甫奎季子泰定四年擢第仕紹興路推官歷户部尚書遷平江路總管所著有詩經補注友迂玩齊蚓竅閩南東軒諸集行世元史有傳逰江隂君山孤嶂臨滄海千山湧大江逺帆歸市獨髙塔到波雙鷗鷺爭洲溆蛟龍怒石矼壯逰心未巳飛雨灑樓窗侯天祜案天祜字伯純湖上逢僧逰春間步西湖上煙波淡蕩辰山花迎客笑溪栁為誰顰燕妓紅衫短胡僧白帽新料應嫌寂寞也恐負青春錢震孫案震孫字公茂送張仲益北歸家在浚之郊言歸豈憚勞蘇章貧有笈范叔冷無袍故里多君子明時待俊髦臨分惜春暮風絮滿江臯次韻程主敬存真道院納涼知君山水樂任爾簿書牽官舍哦松暇仙家借榻眠詩成彩筆健酒㵼碧筒圓鵬鷃難同調蹉跎祇自憐送憲副暢公調浙東萬里綸音至三秋玉節遷江山粵王國書畫米家船慣飲雙溪水行登尺五天道山清絶地重見賜金蓮施正大案正大涇縣白塔里人至元間丞相巴延下江南辟知本縣初縣治在水西苦漂蕩正大徙於水東迄今賴之挽括齋教授六館真英傑三朝舊典刑叩閽曾抗疏避地復橫經仕路驚頭白家山入眼青平生清苦處身後有餘馨王時中案時中字伯庸送吳起季溫州學正十載儒官冷新除又逺州七山如北斗多士數東甌紅樹城西晚黃柑海上秋橫經有餘暇雁蕩足清遊胡元舉案元舉字子仁蘭亭山長送歐陽生歸省甥館琴書樂胡然賦式微定應烏反哺况有鳯于飛江雨催行棹秋風吹客衣行當榮祿養作吏未為非王鼇叟送翟録事籍甚霜臺客云胡滯録曹常關羅雀户焉用割雞刀事劇心常易官卑名自髙乘驄應不逺去思繞江臯荀原道城中晚歸即事催歸啼更急相望白雲還西日眩行色東風醒醉顔僧歸黃蘖寺鳥盡敬亭山後騎且莫迫月明溪一灣次韻馮麗明表兄山居見招多謝知心久長懷會面遲移家竹深處課子雨涼時種菊鋤荒徑騎驢過小堤山中足詩興把酒許分題李震午自笑旁郡方戈甲幽居獨草萊月隨雲影沒風挾鴈聲來自笑生涯拙仍嫌嵗序催有山㻣著眼無客共銜杯髙德壽山居春興白屋窮經士青山習隱身吟餘花落砌睡起烏啼春沽酒為延客借書頻訪鄰誰能入城市揮扇障紅塵趙由皎近况寂寞溪居好鋤畦自種蔬催租人至數問字客來疏飢阻傾家釀吟妨課子書年華今若此生計復何如師敏自述對花驚鶴髮種竹作菟裘每惜陶元亮空懷馬少遊飲河期偃鼠粘壁笑蝸牛獨有琴書味雖貧老不休董天吉送亷使傅公天涯將踏遍産處合黃扉心共燕雲逺身隨漢節歸江寒鴈半渡霜落蟹初肥晝錦西風落時應念布衣送萬户府經歷龎世安鹿門培隱德鳯穴産竒毛曵組全家貴談兵此客豪書籖沾雨濕箭鏑入雲髙歸到荆花下春缸醉玉醪逰廣教寺靈山袪俗慮萬境一漚空黃蘖十年寺緇衣數畝宫殘鐘咽昏曉古樹飽霜風消得騎鯨客題詩殿屋東偕亷端甫副使逰三天洞戴帥初作詩次韻若領東山妓定知無好詩平生謝公屐到處習家池渡口船頻繫沙頭榻屢移還應見漁父相與話心期誰鑿通天穴雲窗次第開玉泉鳴有竇石室淨無埃地老禪房冷山空俗駕回彈琴當此際龍象亦應來丘巨源夜坐靜坐書齋夜蕭然一事無松聲譍月户竹火笑寒爐倦讀緘昏睫疏吟惜斷鬚浮生緣底事兀兀付團蒲冬日粗喜農功畢仍耽夜興長移蔬充嵗計藝麥續資糧桑落新風味松明耿夜光結茅乘屋亟户外任氷霜潘鉉案鉉字仲金聖輿長子瀏陽教授挽劉竹所屋角為鄰並書聲隔户聞三年湖海去一别死生分黃壤蒙新棘青編冷舊藝故人何處所楚竹慘溪雲錢霆午送王敬叔之四明木落楚江清仙槎指四明固知東道主仍致北涯生浴日窺暘谷飛霞望赤城登臨有佳句聞鴈莫忘情孫叔逺送申推官滿秩北歸申前任涇縣尹向來山縣宰復此秩推官要路開騏驥長才峙鵠鸞豐年歸夢好涼雨暮江寬昭代論人物應堪柱後冠施璛北行道中去去中原路青山不厭看馬羸愁雨滑貂敝怯霜寒自笑謀生拙寧辭行路難日邉今咫尺舉首是長安梅實案實字仲實堯臣九世孫官集慶路照磨至正末明兵破城不屈死寄李遵道與君相别後湖海久無書聞在龍舒郡新開馬隊居斯文欣未墜客况近何如自昔鄒陽學何門不曳裾李公明宿水北此日苦易感那堪秋氣清最憐今夜水只是舊時聲敗屋若無主新功屬後生悽悽出門去不是有離情徐恢與孫丞子肅别余杜門月臺蓬蒿滿徑車馬之塵了不相及晉陵孫子肅為丞玉山一曰因事上府時時舍輿曳杖載酒論文必極歡而後去凡余胸中所藴未嘗呈露於人者子肅皆深知之由是相從愈密未幾子肅以君命攝邑事不相聞者又數月及解官將歸復來告别余知子肅之才必有用於世者因賦五言四首道其本末以為餞故於終篇尤不敢以淺淺者望子肅也興豈山林盡情因市井疏溪流行復止雲意卷還舒翻著梵志襪倒騎潘閬驢君來明許事笑指一牀書官負崔斯立才優滕大夫此聲方得楚適意巳思吳賀厦聊今日躋榮必要塗君心如北闕我興亦西湖過眼非無客敲門獨有君不惟頻載酒仍許細論文意好吾何恨情親世未聞重來方暖席别袂忍令分朝路紛羣策君才自一家九重方旰食萬里尚飛沙樹脫涼風葉蓼疏清露花何因得美酒留語至昏鴉附五言律詩按永樂大典內凡係失名失題無考者附後送孫仲安湖州學録束書當嵗暮祖道集時珍燕尾舟行夜臯比座擁春露茶烹紫笋雪縷鱠文鱗此外堪持寄詩傳罨畫真冬日寄吕周翰徑葉朝慵掃山扉午未開拂琴翻舊譜洗杓試新醅晉帖人臨去吳鞋僧寄來水村松館外時節又尋梅東郊因成野酌得家字行尋東郭勝二妙欲攜家倦息依茅屋流芳覔杏花時羞鳬去翠春酌酒傾霞何日成三徑求羊迹未賒紈扇團圓手中扇誰為剪氷紈明月生懷袖清風濯肺肝當歌筵畔小驚夢枕邉寒學取秦臺女相携駕綵鸞次陳仲恕邦傑同逰北園之什塵埃成俗吏風物屬間人但見詩無敵爭知筆有神唱酬俱白雪行樂及青春聫轡歸來晚江郊月色新送李士元經歷北歸解組多時住開帆此日歸正逢鴻鴈到喜共鶺鴒飛北闕身還近東山志不違敬亭回首處但憶謝玄暉南國疏放消塵思登臨近物情鐘聲過暮靄栁色上春城列岫連天逺前溪隔樹明雨餘多意緒照眼句能成幽居竹院秋逾靜柴門晝不開病先携老去懶漸逐衰來莫遣新緣結都將舊念灰川魚與雲烏從此莫驚猜挽嘉興縣丞孫暘谷舊轉黃河粟頻哦赤縣松人方歌蔽芾公巳主芙蓉雪暗菟裘地雲深馬鬛封悽其送丹旐執紼涕無從挽觀察判官魏君忠孝前朝著風流奕世存懸鐘魏絳宅遺笏鄭公孫雲散餘仙洞花開自故園傷心延客處稚子獨譍門宿省襆被趨省宿披襟對晚涼古心知老樹生意見新篁鐘鼓鳴將合蜩蟬噪更忙靜中觀物化誰與共平章挽潘肅齋幹二首白髮商顔老黃花靖節年角巾人競學麟筆世無傳竹斷幽棲徑瓜荒手種田百年耆舊盡萬感淚如泉避地鍾山後看雲疊嶂邉豪華南國盡風度北人傳腹有藏經笥囊無葬骨錢三株森玉立總解讀遺編客丹陽喜王起之至試數髫年友兵餘子獨存逢人長問信見面却無言雲泊丹陽樹橋連緑水村翻嫌煙雨外為爾役離魂送葉𢎞道赴當塗醫教西風吹句水送子宦當塗康伯名傳世醫和業近儒囊中漆葉散肘後玉函書自笑無聞者依然病顙駒悼程清叟今度過符裏先生巳不存遺書空滿几傳業僅餘孫秋雨茅茨屋霜風芋栗園寒莎封馬鬛聊為奠吟魂挽損齋劉待制西蜀雲山逺南陵水竹竒紫騮梅令邑白酒謫仙詩視草催秋直藏舟惜夜移惟餘雙鳯羽五采瑞明時失題十日為山客今朝問水程沙橫疑港斷灘迅覺舟輕逺近村舂合髙低漁火明回頭忽蒼莽一望一傷情
