body:
  text: 宛陵羣英集卷九元汪澤民張師愚同編今體七言律元汪澤民敬用龍溪公次南安軍詩韻寄仲芳兄十年江漢等萍浮為客漁城麥又秋塵事滿襟寬帶眼微官何物誤刀頭春懷花樹宗家㑹夢繞松楸故里愁暖翠晴嵐佳句在凄凉先哲此曽逰上元侍慈親家宴春風燈火客吳閶時雨新晴夜未央門外十分明月色堂中一㸃夀星光傳柑節序隨緣賞奕葉孫曽衍慶長况是聖朝新孝治金華早晚拜恩章送胡伯恭赴婺源州任判官遂有先墓之託一溪環郭萬峰竒鄰壤圖經豈待披邑戶采金歸禹貢蠻商懷貝謁蕭祠先聲警俗山無盜後日尋春卷有詩松柏城南托京兆宗元聊解故鄉思贈王道寧憲使遷浙東司憲曽臨列棘中賔賢堂上挹清風幾回車笠逢江左一日囊衣向浙東士借才名勞案牘人思德化活疲癃欲知别後懸情處明月相思兩地同壽王秋崖萬户胸次何論百萬兵剖符作鎮宛溪城三軍部曲魚麗整十載溪山虎落清定逺從來食肉相祭遵不忘雅歌聲稱觴嵗嵗流觴後有酒如澠樂太平送耿左丞赴中臺侍御原注時督漕在姑蘇左轄官崇聳附蟬暫分南省此旬宣黃封雨露來天上白筆風霜近日邊賜祿未容閒宋璟明經方欲相韋賢還朝端慰蒼生望敢向楓橋惜别筵送孔用道山東副使千里星軺不可攀離筵空自疊陽關步趨方接䕫龍上政教初興齊魯間鄉國誰非驄馬貴君侯真著繡衣還髙樓别後偏凝竚覆野春雲起泰山送方嘉父臨江覲省籋雲宜食玉山禾十載江湖尚轗軻漫說平生不龜手誰聽中夜飯牛歌髙堂正欲調親膳壯齒寧容隱釣蓑賸采黃花須盡醉清秋無奈别離多和楊侍郎輦下書事韻曽看長安陌上花萬方人物仰皇家龍門變化風雷夕鳯闕瞻依日月華曉色宫槐連御栁春聲疊鼓帶凝笳聞君髙詠燕山雪三復新章絢彩霞挽貢仲堅秀野園亭景四圍南湖風月賞無違明經不待彈冠薦采菊旋思解綬歸梧檟霜寒嗟拱木蘭蓀春暖藹餘馡髙年厚福公何憾空想光塵淚灑衣挽王相伯尚憶通家談往事齊廬燈火每忘年居依李願歸盤谷圖似王維在輞川襟佩楷模懷化雨衣冠耆舊隔重泉從來為善多餘福看取孫曾不乏賢挽趙陽山早嵗科名摘頷髭振振麟趾冠當時故侯甘隱青門老輿尉寧知綘縣師書帶草生人自逺山鞠窮盡疾難治原注鞠起弓反山鞠窮乃禦濕之藥弓裘有子應無憾獨憶通家涕泗垂挽王敬叔薦書才上海塵揚南郭逍遙與世忘摩詰平生詩可畫無功晚節醉為鄉驚聞佳士逢蛇影愁絶難兄失鴈行漢史何人書獨行銘文三復涕霑裳代挽楊桂巖門外空迥長者車草𤣥論字總何如秋當鴻鴈傳書後嵗在龍蛇入夢初諼背東風留綵服瓜廬夜雨憶春鋤山陽笛裏無窮恨滿目寒雲淚灑裾竹庵居士風鑒精深賓興未行時深以榮名相期豫未之信巳而果預科目相别五年逺訪豫于昌江賦詩贈之緑髮相看十載前談王端欲老林泉君言明逸終當貴我恨希夷不許仙幸折桂枝符舊約喜培萱草得長年春風握手昌江上一笑虀鹽有夙緣挽師炳仲二首清標逸氣獨飄飄束髮耽書但一瓢初說御觴蛇作祟忽聞占䜟鵩為妖承家舊業誰堪付隔世逰魂不可招寂寞華陽正丘首文場從此亦蕭條還往吾廬經七十興懷樂事意茫然秋風吹帽南峯上夜雨連床宛水邊交臂偶成千里役修文遽隔九重泉題詩一灑無從涕空想聲容閲舊篇貢萬里按萬里官嘉興教諭次九萬兄九日詩韻身閒贏得細看茰何况秋來一事無栗里田園多種秫鑑湖風月不收租瘦吟幾度寬衣帶醉舞有時敲唾壺只此生涯雖冷淡也教佳節不虛拘重陽即事呈隆山先生蕭蕭風雨重陽節渺渺江山萬里天子美登臺曽有句淵明對菊偶無錢升沉未用論時命聚散因嗟歷嵗年倦倚闌干數歸鳥相思却寄碧雲篇胡則大歸自京都仲章有詩見貽次韻扊扅歌罷客歸來昨夜燈花信可猜草色幾牽游子恨柴扉重與故人開九霄雲路南鵬舉萬里鄉心蜀鳥催莫學并州窮賈島杖藜湖上暫徘徊汪用敬送楊好古浙東憲掾才思飄飄逈不羈青年髙步際明時黃堂雅望推三語烏府先聲重四知石室嵐煙凝紫翠蘭溪梅雨漲漣漪公餘想遂登臨興好把新吟慰我思拜雙澗祖墓瞻望松楸四十年兹辰拜掃獨悽然黃花紅葉孤坑路冷雨凄風九月天幸續蒸嘗歸舊業冀傳簮笏仰前賢清觴一奠抒誠敬回首華峯晚翠連張知言案知言字公允師愚次子上御史二首英英清譽冠羣才豸角峩冠向此來丹桂當年分兔窟繡衣今日照烏臺霜飛南國炎氛靖霧斂澄江霽景開豈但乘驄司六察㑹看補衮上三台分振臺綱下鷺車文章勳業見真儒春風已驟看花馬朝彩還吟借樹烏霜氣稜稜飛白簡月華皎皎映氷壺九重正爾思賢切宜有嘉猷贊廟謨夀施氏子芳卜築東郊久避喧青雲無意在騰鶱花圍錦繡春生座水引漣漪緑映門芳逺題詩延上客巢林傳業見聞孫華筵稱壽端陽近蒲醑浮香滿玉樽施琪次丁志道憲使迎詔韻二首驛使傳宣到謝城羣公聨轡出郊行芝泥恩重春風暖柏府雲開曉日晴禮樂光華逢聖治衣冠鼓舞慶文明從知寰宇多生意隨地欣欣草木榮一從跋扈竄邊城王政班班次第行每聽絲綸傳好語正如鐘鼓報新晴九天胥慶風雲㑹萬國咸瞻日月明江左幕賓陪繡使侵晨迎詔沐恩榮送吳巡檢􅌢弓箙矢發征鞍元是青衫一冷官雞犬不驚桴鼓靜狐狸屏跡里閭安縱遲萬里雲霄路還勝三年苜蓿盤去去桐川動詩興梅含椒蕚雪初乾梅致和夀憲使繼學王公疊嶂清風凛凛寒繡衣於此偶躋攀宦名不在姚盧下詩律仍居李謝間青史竒勳傳聖代丹砂祕訣駐仙顔九重政爾思賢佐催覲芝封指日頒挽叔章兄壯年負笈旅京華芹泮花封屢及瓜陶令到官尋解篆潘郎奉母自扶車支宗共出南昌譜貧族常依北阮家賴有佳兒追李密時於堂上奉萱花何儒行送任亷使由浙東除浙西雙溪秋色敬亭雲三十年前此奉親原注任父嘗為本郡推官駟馬髙車隂德厚繡衣玉節使華新月移江國無私照雨入吳鄉有腳春正為皇家念民瘼重煩原隰遍咨詢上亷使繼學王公姓字凌烟煥古今江東欣覩使星臨文章兩漢諸儒右忠孝孤臣萬里心玉節繡衣新命重黃扉紫閣舊恩深定知調鼎思賢佐早晚天風下玉音送谷仲臯之江浙理問知事舊聞臺憲慣逰遨又見中書簡俊髦秋水芙蓉賔幕靜春風芍藥省垣髙光分謝眺樓前月寒捲錢王海上濤分望直須峩豸角九霄蒼隼見秋毫贈陳玉林鍊師玉林自集慶歸鼇峯為其師毛月湖稱夀臨别賦詩送之時江柬經歷李之寅為南臺御史故詩末及之歸來明月滿湖天雪霽鼇峯玉樹鮮曽是飛龍亭上客却為騎鶴洞中仙莊周已悟生虛白揚子猶能草太𤣥若見隴西驄馬使為言踪跡尚林泉送賈亷使赴左司郎中一道澄清政不寃何如四海沐公恩風霜筆底秋凌烈雲夢胸中氣吐吞教雨欲霑丹桂籍文星先入紫微垣傳家况有治安䇿佇看陽和轉化元送史郎中滿任麒麟勳業煥丹青又見猗蘭奕葉馨真定衣冠推閥閲陵陽風月入箳篂桑麻千里霑春雨溪嶂三年覩景星贏得清名騰柏府翩翩一鶚上秋冥清明前一日施敬叔約遊廣教寺按宣城縣志作永慶寺澄江西畔扣襌扃暖日聨鑣趁踏青茂樹清泉丞相宅閒雲飛鳥謫仙亭山中不雨花常潤林下無人蘭自馨醉後摩挲庭外碣風霜杉檜幾朝經劉得之寄貢道甫奉禮花容栁色表芳春宛句溪邊一揖分我似白鷗耽狎水君如黃鵠健摩雲曲臺考禮多從漢清廟登歌屢祀文班列奉常元自好龍旗時見亦欣欣夀魏察判繞屋園亭只種花貞元朝士老煙霞清秋簾幕謝公郡舊日衣冠魏相家樓對青山浮大白雲深碧洞飯胡麻長生有訣元曽用須信于今鬢未華春分前十日和貢南漪韻索笑梅簷日未曛詩來滿紙走煙雲寒收蟄戶雷初動暖入花房春又分白髮數莖明鏡影黃庭一卷對爐芬老來真羡湖山好混迹漁樵意所欣松棚碧玉叉寒嶺上枝分枝結架傍軒墀緑雲當戶何曽動赤日騰空了不知三伏自疑秋氣早五更偏訝曙光遲清隂未必家家有兀坐令人有所思貢師泰題天台道士李東柯卷翠蛟青鳯下崆峒家住天台第幾峯嵗久松肪成琥珀夜深丹氣出芙蓉仙童奏簡騎文虎太乙懸旗畫綘龍昨日從師到天上故山還著白雲封原注東柯常從天師赴京都故及之挽陳公輔髧髦垂絰寄遺孤自立聲名重里閭座上鼎彛前代器篋中經史外家書縣花春老初封印庭藥秋慵久廢鋤惆悵氷壺清絶處露寒應是泣蟾蜍次泗安芝上人韻水氣朝寒散白烟寺前楊栁繫吳船佛燈紅隱流蘇座僧衲青裁海艾氊書報誤叨金馬召厨空應愧木魚懸定知别後相思處楓葉蘆花宛句邊題江隂君山和陸子方韻畫橋垂栁傍官壕隔岸青山似湧濤楚相丘墟埋石馬梵王宫殿壓金鼇天低鴻鴈江流濶風撼魚龍海氣髙聞說城南有真逸烟簑還許伴漁舠送賈有恆赴潞城縣令上黨人參五葉齊郎君春日馬行西滿溪藍水魚初上繞縣青山鶯亂啼小吏報籌衙欲退長官收印手還題洛陽自古多才思好賦新詩寫赫蹄劉鑄遊隱靜寺飛磴盤雲入梵天五峯深翠削青蓮鳴泉似說梁朝事醜石曽聞杯渡禪饑虎嘯林巖際宿老猿啼月樹頭懸我來為愛山中靜徹夜松聲惱醉眠劉錫按錫字禹疇鑄弟有慶次子以䕃授江夏尉調弋陽主簿後用王嘉薦歷寧國推官上左丞早握兵衡晚廟堂虎符珠顆粲龍章賜衣新被乾坤澤衛駕親承日月光耿耿丹心依北闕堂堂素節鎮南荒書生敢恃宗盟舊引領天風為發揚趙次鈺案次鈺字仲相次吳閒閒送張𤣥谷提㸃韻仗劍驅雷雨沛然清都法自祖師傳曽乘白鶴三千里入覲飛龍尺五天羽服星冠承寵渥玉函瓊笈護靈編恭惟聖主當乾運永賴調元奏萬年郭雷煥案雷煥字有章饒州路教授能詩尤工駢麗文時謂之郭四六賀趙子昻初應召北上錦繡心胸玉雪姿偉人一出應明時南邦諸老歌麟趾北闕千官看鳯儀家世不隨陵谷變才名今動帝王知正須箕子陳洪範豈但羲之翰墨竒饒鉉聞角漏歇銅壺畫角催嚴霜飛動曙雲開吹殘孤嶂一輪月落盡寒城幾樹梅逺塞征衣愁未寄小樓客枕夢初回誰將鐵笛三更弄驚舞魚龍亦壯哉汪洊雷次潘季通遷居韻萬竹蒼蒼今已非古梅猶有嵗寒枝橋分野色春還好門對嵐光晚更宜茶竈正須黃葉煮琴床已帶白雲移題詩莫厭催租吏鍾鼎山林各有為賀陳公輔遷居原注公輔買屋得新樓甚喜大隱何常厭市閭新遷端為好樓居坐來叠嶂雲生麓住近雙溪客有魚二頃可供投轄飲五車爭羡載行書門前怕有西臺使未許興公賦遂初胡祺案祺字夀卿繁昌教諭送憲使李正卿移節江陵原注時有賜酒山立長身氣凛然使君元是錦袍仙星移玉節臨三楚露貯氷壺下九天碧樹渚宫秋色老甘棠南紀晝隂連姓名已報金甌覆早作商霖遍八埏潘登雲讀蜀志有感孔明廟柏蠶叢國先主樓桑涿鹿州魚水交情千載遇風煙老樹幾回秋魂飛故宇家何許志在中原死未休漢祚合歸真帝胄如何天不祚炎劉荀原道端午懷屈原曹娥端陽詞客感遺蹤碧艾青蒲顫曉風湘水越江風土異忠臣孝女古今同千年往事人何在五月滄波恨不窮漢史楚騷翻閲處忍斟醽醁對榴紅寄熊平窗長憶春初一笑逢春懷無便寄書筒餘波解洗徐凝惡末路應憐阮籍窮栗里歸來儲粟少夔州以後作詩工樽前底用悲秋苦滿目西疇穡事豐次銅陵何景華賦歸韻何遜重來經幾載新詩繾綣惜臨分厭聽疊嶂樓前雨催拂五松山畔雲歸興故園培菊本閒情春浦入鷗羣為言擬葺昌黎藁早寄東風慰望勤吳復興夀吳子彥獨步詞華起縉紳西江夢澤簡書頻文淵去國常思弟潘嶽閒居只為親香逺亭前荷葉老嵗寒座上柏枝新當年祖笏分明在滿眼孫劉總後塵髙德遊送余三軒赴廣西亷訪副使丹扆皇皇遣使華烏臺馳傳趣齊瓜繡衣直指三千里絲轡周詢百萬家境內風生無毒草嶺頭春早有梅花蕃宣允作南邦式補衮遄歸寵遇加挽王永叔翛然山澤一癯仙生閲人間九十年衛武詩成應自警伏生書在可相傳藻芹春暖香逾逺松柏年深操愈堅有子七旬頭亦白森森蘭玉滿階前
