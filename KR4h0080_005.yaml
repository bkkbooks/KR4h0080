body:
  text: 宛陵羣英集巻五元汪澤民張師愚同編今體五言律宋李含章按含章字時用登太平興國庚辰進士授屯田都官員外郎累遷太常少卿封潘原縣男所著有僊都集五巻石盆寺巨石何年琢為盆勢莫裁圓疑通澤國深可並天台法水長時滿青蓮向日開無人知此喻寂寞首空廻陳天麟青山道中田舍雞升屋山家犬應門馬行黄葉路水遶夕陽村老覺貧為累吾知道可尊此行聊復爾萬事信乾坤舟中湖濶帆風飽山長眼力疲晚涼行進酒秋色㝡宜詩别意果作惡虚名難療飢此生無住着投老欲何之用梁漕韻千里岷峨外三年漢漾西急流衝水馬腐壤伏樗鷄伐樹驚遭宋聞韶喜在齊何時燈火夜重與拆紅泥上瀘帥梁公子輔舊巳元樞幕今猶大将牙恩威伸六詔封域總三巴早晚看鳴佩軒翔入判花不妨乘駟馬上塚一還家冊府推前輩文塲慣主盟冀閑收汗血崐圃出連城料想金甌覆遥知水鑑明從今青與紫四海盡門生六轡澄清日三軍指顧中關山都識面草木尚傾風飲馬伊吾北囬鑾澗水東廟謨應富有傾倒莫匆匆旌德道中山邑無郵傳農夫半甲兵石橋横斷岸草徑入荒城聞道甘泉駕将臨細栁營風塵何日靖留眼看昇平林宗放餞使君始聽歌來暮還聞説去思但知憂國計那肯問家為跨竹兒童集擕書父子隨謝城攀戀處爭作畵圖披吳潛按潛字毅夫嘉定丁丑進士及第歴官中外淳祐十一年進参知政事拜右丞相兼樞密使後責化州團練使循州安置卒宋史有傳送林明府擬續宣城志難忘令尹賢庭空無獄訟齋静有詩篇心似秋雲逺政如霜月懸活人最多處饑歲作豐年送何錫汝風雨一樽酒此懐誰得知三春花老後千里客歸時浩浩人間事悠悠身外思君如能擺脱林下早相期掃墓書所見松楸生夜夢風露作晨征山近却無色葉枯偏有聲架禾知歲熟種麥得天晴到底農桑好營營媿此生李孝先按孝先字介叔含章子以任為太廟齋郎歴虞部員外郎改朝散郎賜三品服勲上輕車都尉卒詩篆琴棋並登妙品著有柯山集十巻登江瀆水心亭晚興清無比幽亭積水中芰荷千柄雨松竹四軒風鬬鴨飛翎健潛魚静思冲飛潛乃常事何足較窮通李兼田里百穀盈成後三秋假樂時雞豚開社甕簫鼓賽神祠野茹青盈筥香炊雪滿匙欲知田里趣細誦老翁詩次韻周與能墜緒今如綫遺書尚滿床功名兩蝸角世路幾羊膓癖有登山屐貧無在笥裳故人應見念莫遣字稀行莎雞悲思亦何苦繁聲咽未休空庭殘月曙衰草故園秋物化終歸盡年華迅若流要當期子夜相與和商謳曉出凌晨躬蕆事未曉出城關路暗雞三唱天青月一彎華香衣笥外嵐翠竹輿間欲盡清游興官程索遽還食兔詩弱質司明視虚名直望舒軼羣辭上蔡能事到中書狡計空多窟珍盤竟付厨獨將毫末效曽紀汗青餘謝張世顯詩巻珍重張公子交情不我遺肯迂林下歩来贄袖中詩江樹煙中色叢梅雪外枝吟哦清絶句一一可同時鍾山白鳥江天濶青山佛閣重影孤寒日塔聲殷暮煙鐘異世文中選當時鏡裏容猶傳遺蜕骨只在此髙峯原註寳公塔在山項世傳梁昭明乃寶公後身發于湖斷岸收潢潦蒼烟出翠㣲衆帆争鵓港孤塔認梟磯萬事皆前定重來悟昨非此身縻薄爵何處避危機李蟠送德基單閼多餘慶清時得偉人德隆荀氏操學慕孟軻醇乆媿溝中斷常親席上珍征帆忽西去悵望宛溪濵劉有慶送楊長卿任贛州知事望郡推章貢斯逰趣不希風清王儉幕春滿老莱衣鯽沼迎秋月螺亭覽夕暉政成如有句肯寄北鴻飛潘獻可春晚三客同出郊歸途甚醉尋友逢三益追歡且一時買魚呼野艇沽酒認村旗暫覺行歌樂何妨醉舞僛牧兒休駭愕横笛且湏吹四月十八日之桐川白鳥蒼烟外黄鸝緑樹間雨晴初有路雲薄不藏山村酒成孤酌征鞍厭獨攀日長人自倦更覺馬蹄慳固城懐歸税駕蠶将老旋車燕欲歸人情秋思薄酒力晚風㣲青鬢愁邉改丹心老去違吾廬元不逺望斷白雲飛元熊不易即事山亦無情色蓮非解語花不傳金谷酒却送玉川茶雅潔焚香地丁寧種樹家白雲生翠麓去去故園賖倪應淵金山寺金錫飛來日靈鼇負地形濤翻四靣白寺裹一山青海月窺簷箔天風語塔鈴倦懐思煮茗誰與汲中泠王儒珍按儒珍儒珪之弟書淮隂傳後椘漢爭雄日乾坤殺氣昏築壇需上将决䇿拜王孫百戰通侯爵千金漂母恩如何天下定却憶蒯生言王圭和孫子善賦落梅花盡春纔半東風枉斷腸空尊愁落月長笛怨清商解佩懐人逺返魂和夢香多生餘習氣為爾借流芳和戴帥初陪亷憲副逰三天洞韻閒居耽勝事逺意得扁舟白社多豪逸黄花共拍浮江山酬句律時序入觥籌不似城中客紅塵漲馬頭勝迹三天洞清逰五字詩懸泉垂馬乳暗谷隠龍池坐久禽聲集吟殘樹影移賢侯興不淺應有後來期黄葉荒溪滿青蓮紺宇開闌干盤石樹方丈出氛埃洞古游人識巖髙倦翼回祇應山下叟常脱繡衣來莫道禪扉小幽人舊此巢結跏餘石蹬飛錫想林梢自喜遺塵鞅非因問貢包詩成留歲月醉墨灑泉坳題趙景陽所撰朱節婦傳寡鵠中宵泣寒棲祇舊枝細㸔彤管記何愧柏舟詩教子斷機織養姑生鬢絲誰能旌孝義為奏九重知王璋憲副亷薌林以賔客泛舟逰三天洞帥初有詩紀行次韻上國皇華使清江畵鷁舟山光屏上見樹影鏡中浮㵸茗先誇水行盃任㸃籌紅塵滿城市小憩莫回頭古洞堂皇敞危巔戸牖開隂靈藏雨雹清絶離塵埃破静幽禽響臨深駭鹿回百年山下路未省使車来不作招提境應宜隠者巢金沙明洞壁珍果落松梢寺戸泉供釀禪僧石打包出山還不逺艇子挿林坳送潘季脩之新安學正文公遺舄地子去作儒官六月火雲熱千山行路難定知軒鶴舉何惜案螢乾故國多圖籍歸時待借㸔題曹娥廟稟來純孝質何必讀詩書斷石苔侵字荒祠客下車林香埋玉骨江淨出文魚多少儒冠者低頭媿此姝甄府判致仕賢哉此大夫未老已懸車雅志甘丘壑髙風照里閭兒能魯殿賦家有鄴侯書愛惜軒裳者稱量恐不如雨止登土山龍湫連峯干象緯恠物宅岩隈抱石多竒樹非時有怒雷郡官迎水去野老賽神來似識幽尋意山雲為我開九日雨中懐牟文甫問訊籬邉菊今朝數蘂黄山林成皓首風雨又重陽老去才都盡秋來興故長相思礙行潦不得共傳觴約文甫不至再用韻俗裏眼能白懐中印未黄雙鳬離葉縣獨鶴下陵陽晚歲故人少閒門秋草長知君非逺我自為困壺觴謝貢仲章惠羅帯古鏡紫織文何麗青銅瑩欲流何殊鞶鑑重愧乏紵衣酬寛覺腰圍减明嫌鬢影秋雙珍無一稱但感意綢繆次韻郭祥卿雪霽見懐雪嶺留初日髙齋照眼明禽聲交曉樹馬跡上春城有客懐幽賞題詩問友生青鞵得來徃更待數朝晴汪鑫曉發霅川鐘絶棹歌發霜寒過霅川雲棲山頂寺月墮水中天宿雁驚漁網啼烏近客船舟人自相語滄海半成田舟行望霅川水郭蒹葭裏荒祠集暮鴉舟行隨岸曲㠶轉受風斜歲晚愁為客天晴喜近家野梅如有意忽見水邉花汪銖散歩偶成飯餘同散歩擕手過東村詩覔友人和方尋醫者論雪消溪路滑水出石塘渾歸語山窓下爐頭火尚存夜宿白雲寺撥雲攀絶磴窈窕入禪扄瀑布飛來白煙巒濕處青齋厨猿掌㸑磬室虎聽經更有清心處幽花發素馨重過昇州昔號衣冠地今為狐兎丘興亡原有數歌舞竟成愁落日烏衣巷蒼煙白鷺洲徘徊不忍去知者為心憂送何鍊師還山舊業昭亭下歸來雪滿簮潛魚脱溪網老鶴戀雲林風磴松花落烟畦藥蔓深不知從此去何日定相尋送魯山長鱣堂初徹講宦路又三年夜醉丹陽酒朝登白下船蜀天迷去雁楚客怨啼鵑懐徳情難報臨分重愴然雪夜寒光主人别業林風雪夜清相對有閒僧坐久然松火眠遲話葛藤天寒悲裋褐牕冷翳殘燈到此忘機慮欲歸猶未能挽羅一舟原註任武進教諭怡堂當日宴談笑憶驚筵坐失同庚友那逢在巳年文興人巳老武進士無縁賴有河東鳯斯文定永傳挽章恬齋講道陵陽日猶如太學時青燈照寒席白髪被深衣明月雞山隠凄風麟野悲舊人惟宋玉清淚獨長揮陳良弼按良弼字公輔少辟憲史有聲為嘉興路教授調上元簿後以旌徳尹致仕遊三天洞混沌知誰鑿虚明夜不關雨晴松子落洞濕土花斑泉洗金沙净雲封白石閒空山千古在龍去幾時還梅徳明和汪叔志晚望山門韻山門藏絶境青壁上參天石漏牕中月巖通洞底泉幽期恐揺蕩晚望毎留連逺憶瞿硎老神交碧落邉潘如瑗用韻柬董瀾溪南國文章伯于今董仲舒青雲跨騄駬碧海掣鯨魚到處誦君實逢人讀子虚如何相見晚潘鬢二毛初胡寛自述兼别陳華仲侯敬所白髪返初服所交今漸稀掃霞眠石冷汲井灌蔬肥樹老花慳發天寒鶴戀歸何人江海上早悟蹈危機趙孟熺長至緹灰浮北律香雪㸃南枝天又還周統人思見漢儀眼前能獨樂心事竟誰知頼有床頭易時時對宓羲見從兄資深一别八年久兄西我戍東雨床頻入夢天柱忽摧空命各逃兵後心俱類醉中不堪談徃事加飯且頥躬胡晉題劉氏嘉秀亭竹好能醫俗池清可鑑心要湏娛晚節直此抱冲襟茶竈沾晴露書床趂午隂山王雖貴顯不入五君吟和𤣥妙道士汪樂全韻按宣城縣志作𤣥妙觀矯矯餐霞子凝神志不分丹書研曉露仙服剪春雲山水鳴琴悟松風煮茗聞時能吐佳句艶雪舞繽紛汪珍雜興柔鐵不成劍散材難作轅侏儒笑方朔年少辱王孫自分駒閒皁誰将鶴寵軒平生赤藤杖信歩答乾坤山居我愛山居好經旬不出村芭蕉全學扇啄木誤敲門酒病妨開巻天隂罷灌園當年杜陵老北崦與東屯郊居雨餘芳草遍氣韻入梅初客借分茶杓隣同灌韭渠山苖尋杞狗野飯割椶魚信美真吾土何湏更卜居渡口漠漠村墟迥㝠㝠煙火㣲廢䑓猶近驛舊館半無扉水濶魚蝦賤天寒鴻雁稀前途正風雨泥淖上征衣過當塗原註是日拜李太白墓不見當塗月空逰太白祠六朝多少事孤客再三悲圩父収菰米舟人唱竹枝蒼蒼煙水外搔首立移時西溪黄葉三义路清溪十里村蒼藤懸古木流水帯荒原歲晚牛羊瘦天寒鳥雀喧居人戀風土耕鑿長兒孫舟過三塔寺渡雙湖亭亭望三塔𣺌𣺌渡雙湖天濶低歸鶻江平散浴鳬煙寒傍城郭風急響菰蒲遥聽舟人説荒林廟子胥曉發夜宿吳鄉雨朝行越樹煙山川頻送客風雪故催年舟穏㸔三老囊羞得一錢歸㠶喜無恙伍廟大江前失題二首水色裙腰碧蓮香女頰紅峯巒雙竺外煙雨六橋中一自風塵改都知夢幻同相悲最相識搔首問吳鴻僦屋與山近山房即是家渴禽窺硯水幽蝶䕶盆花習懶抛詩草安閒長道芽誰能共觀妙不必卧煙霞何致中寓潭清束書逺塵市僑寓畵圖間花落林逾静鳥啼春自閒無錢邀白墮有分老青山不是嫌賔客清風為掩關深秋桂染花三色簾飛水一灣苦吟生白髪歸夢繞青山雨久琴絲潤風清扇影閒逺逰元未厭丘壑可躋攀貢奎同朱克齋蔣教授遊大聖寺數畆林塘逈危城下百層客逰偏得地寺静不逢僧隔㟁連商舶重門鎻佛燈愁来詩興短回首暮雲凝搶竿嶺薄宦辭家逺經秋未得歸直隨山北去却背雁南飛川净白雲起郊平紅樹㣲憶曽留宿䖏立馬認還非陽墅道中馬上千峰列溪行不盡源野船髙似屋山縣小如村路遶田間曲池漫雨後渾静來應最樂緑樹擁柴門郊行雙溪溪上路重到五年遲桑柘成隂處鶯花向老時泊舟隨岸曲坐石㸔雲移政愛沙鷗狎驚飛底見疑樹末炊煙緑人家住澗西風輕鶯語滑泥重燕翎低塵渴憐新釀郊吟憶舊題小莊蠶最熟喜欲報山妻别墅通幽徑肩輿駐午涼石楠雲䕶影籬蔓雪浮香地僻疑忘世民淳喜饋漿㣲名何足戀投老更徜徉張師愚林亭結宇依林木虚閒愜隠淪柴門時有客苔逕自無塵摘菓山童慣營巢野鳥馴清風人可挹鄰曲漸還淳送南陵宰見説今為邑南陵政有餘春阡馴野雉夜網縦溪魚肯和歸來句方催上考書清時宜柄用要路莫踟躇送陳公輔之采石院長鶯花迎曉色書畵載輕舠肯道儒冠悞翻嫌幕府勞蛾眉上碧落牛渚送春濤地勝仍多暇吟詩弔錦袍送李一中遷浙東憲使之子浙東去行韉風正薫名駒真汗血蒼隼快凌雲縁飾資經術彈治賛惠丈清脩家法在應不愧前聞題郭節婦手巻淮海兵戈滿崩城哭杞梁諸孤逺從母萬死竟還鄉貞烈光前古絲綸表未亡開倉汲長孺端可慰髙堂送薛屏山司税秩滿将集選曹少保唐朝傑聞孫南土英征商嗟絆驥祖道正啼鶯折筍供慈母㸔花到上京牛刀如可試莫惜惠宣城送孔世廣闕里支宗盛銓曹選擢優行堪振鴻羽豈待敝貂裘楚澤蒹葭晚吳鄉橘柚秋歸程逢勝槩舟楫得夷猶送沈衡州自息潢池盜誰移北海風地優千里選才屬萬夫雄樽俎威名外江山坐嘯中祇今䑓省上未可後諸公
