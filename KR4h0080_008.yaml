body:
  text: 宛陵羣英集卷八元汪澤民張師愚同編今體七言律元陳良弼題潭州李安撫祠堂一木能支大厦傾忍聞垓下楚歌聲要令闔室忠王事肯使降書入帝城科目有人名不朽祠堂畫像面如生勢危大節方能見千載流芳在史評梅德明送郡幕傅經厯三年主畫向陵陽更覺蕭然兩鬢蒼審象幾時求傅説為郎從昔老馮唐柳枝歌斷山杯盡梅雨晴來江路長未得還家問松菊黃金臺上看翺翔送劉石泉青藜家學子能傳五載橫經得舊氊屢喜鶚書登粉署會看鵬翼奮青天玉山未許成真隱宛水先拚醉别筵若過西湖訪陳迹梅花未落待吟韉胡寬送麻居靜尊師往武林三茅觀早侍珠庭預祝釐清光咫尺不相違露杯數賜金仙掌霞􅌁初裁玉女機紫詔從天龍護去白雲移海鶴辭歸希夷真契仙喬侣菲薄無因便拂衣送族弟孝立往上京扈驆蕭蕭萬馬嚴雲光草色碧相粘暫韜彩筆高吟輟初挽雕弓徑力添野次障開紅罽毯晨餐盤進水精鹽少年亦愛從軍樂今日才名况汝兼潘如瑗移居黃沖西岡西畔翠藤遮石徑斑斑帶蘚花間客敲門來看竹小童掃葉為煎茶張琴松下風聲細讀易梅邊月影斜潘閬愛山曾入畫聞孫此日又移家潘泰之壽憲司楊志行照磨臘容春意正駸駸誰道陽和散涸隂豈但子雲能識字固應伯起解辭金官居庭户清逾厲筆底文章思轉深且向梅邊斟壽酒枝南枝北總無心和録事吳正傳登景德寺閣韻按宣城縣志作開元寺閣上國大賢吳季子風流非復舊潘郎君詩秋色同瀟灑我興滄州空渺茫宦海才名雖異調騷人胸次豈殊鄉三生杜牧今何處眼冷禪林木葉黃詩意慘淡經營似畫圖神遊物外有還無灞橋雪裏情應苦飯顆山頭人亦癯敏掣鯨魚當碧海幽隨象罔索玄珠出塵解悟天機妙一字何勞撚斷鬚潘復之送高羅谷之荆湖德安府教授谷澗何須賦考槃明時未覺道行難黃雞白酒南陵别華髮青衫慱士官羣彥正思沾化雨丈夫豈信誤儒冠謫仙舊隱遺蹤在巖畔碧桃誰共看貢士源送李行甫任南雄教授江上春風帶雪寒沙頭雙玉酒頻乾廣文官舍誰言冷客子青山不厭看煙浦泊船盧橘熟晴林倚杖荔支丹逺鄉珍味殷勤致壽母佳兒兩地安貢士濬挽劉景南卜鄰長傍舊山村水滿新塘月滿門嗜學不須營利祿藏書何用廣田園人生已過八旬壽祖訓無慚九世孫原注侍御九世孫明日黃花秋寂寞露叢猶自泣吟魂趙孟熺餞林景嘉萬山深處枉吟鞭珍重東山雁字傳握手秋風新句裏論心夜雨短檠邊使秦豈覬黃金贈歸趙難求白璧全腸斷陽關留不住江閩相望隔雲煙胡晉送成經厯之西臺御史醖藉襟懷夢澤寬每欣倒履罄交歡暫依江左芙蓉幕又著關西獬豸冠霜鶚縱翰風力峻玉驄持勒雪花乾從來內輔須臺閣會看班行列陛端汪珍壽殿幹叔祖絳榴花下紫綸巾笑問銅人五百春再數行年從丙午别參內景守庚申世間萬戶詩無敵天上三星箕有神造化當今公老壽壁中科斗誦先秦次程子英金陵懷古韻桃葉桃根樂府詞江南千里舊封畿黃旗紫蓋關興廢東府西州有是非故苑半隨秋草沒征帆猶趁暮潮歸搖鞭奪得蛇矛斷夢破重營繞日暉送族叔平仲赴都謁選詔出如綸士氣張行應辟命稱材良從來筆下波瀾濶合近天邊雨露香漢水彭城形勝在燕花薊月道途長萬金信好君須寄最是高堂念有方迓盧踈齋肅政使去年幕府雪晴時誦得虀辛絶妙詞溪樹迎人寒欲醒春陽行處本無私輪埋當道豺狼避月到空山魍魎移白髮遺民思舊德相看繡斧重褰帷登宣城夜炊芋火厭鹹腥曉困差便卯酒醒雲雨弄晴翻覆手山川送客短長亭天涯嵗晚思田畝原上風寒賦鶺鴒明日歸程好行色梅花春小麥䀶青貢奎送師道姪赴太常奉禮并寄勉師泰江浦風帆拂翠微宦情日日去如飛容臺晝靜花明佩玉禁春深柳染衣隨直定知車比上思親莫忘雁南歸青雲故友應相問為説煙蓑老釣磯四月含桃喜薦新紫衣贊禮屬芳辰官稱猶是青氊物老大潛驚白髮人客久虀鹽憐汝弟病多藥石愧吾身小窗風月連牀夜記取挑燈莫厭頻惠安橋涔陽山水壯南州千尺飛梁速去郵蛟鰐翻波聲吼夜虹霓分雨氣橫秋險疑雲棧通車馬高比銀河挾女牛巨萬功成書太史絶勝舟楫濟中流餞王敬叔一年湖海一尊同醉裏那知鬢欲翁投轄不緣今日雨論文未減昔人風春隨流水三分盡酒重交情百罰空莫道雙溪堪舉棹片雲來往敬亭東送胡則大赴宣州學正小謝樓高宛句傍一氊分坐任凄涼休如鄭老嗟官舍好似并州作故鄉俸薄儘供妻子纍身間不受簡書忙評詩應到城南宅千樹春風雪正香通州道中萬雉參差雲霧開四千里外客重來平岡日出車牛喘古道塵飛驛騎回白玉至今傳楚璞黃金自古説燕臺高樓紅斾應如昨莫遣新愁到酒杯寄張芳洲客裏秋風厭道途歸來決䇿侣樵漁知心白石煙霞在滿眼青山故舊踈畏熱還思親枕簟愛間應愧負琴書麻姑池上花如錦何日相過駕短車送謝明逺之官平江碧波千頃照姑蘇目送危檣數幅蒲古寺雲遮丘卧虎荒臺葉落夜啼烏黑頭清鏡來勳業緑幕深衣入畫圖暇日過遊新得句秋風應寄故山廬杜仲悅知事庭桂産芝庭桂婆娑更老蒼秋風忽見紫芝房九莖同作月中影一樹交浮雲外香飢茹未輸商四皓芳傳應比竇諸郎寄生不似凌霄蔓空附喬松百尺強送汪叔志之南安繞郭清溪帶路長衝寒極目送危檣水涯梅柳傳春信雪後樓臺照夕陽杜牧吟邊山鳥去謝公行處石苔蒼碧雲暮合天無際回首相思欲斷腸久留翰院思歸日日思歸未有期夢魂幾度繞園池白雲滿地山深處紅日當簷雪霽時竹外板輿春步小花間銀燭夜筵遲好將烏鵲頻占喜便買歸舟泛碧漪郊行馬上看山山不盡客中行路路偏長叢祠社散羣烏啄層漢秋高數雁翔踈雨著人絺袖濕微風吹面稻花香回途偶憩幽塘上顛倒松隂百尺強梅致和劉有之過雙溪書孰值余歸省及門而返次日以詩見贈用韻奉答先生氣節抗浮雲日糴真同鄭廣文要結溪邊鷗鷺約豈期雲外燕鴻分籃輿興盡中途返梅雪香清隔岸聞珍重詩筒頻寄我明當授粲謝殷勤和答劉有之韻寄迹南岡四十年平生書榻膝曾穿驊騮正待王良御杞梓寧期匠石捐揮塵春風長滿座窮經白雪已盈顛弊裘典盡囊羞澀猶向鄰家貸酒錢汪叔震和張貫道詩見寄次韻答之貴介爭營翠釡駝何如章甫聳峩峩空階黃葉秋聲早殘卷青燈夜雨多賴有新知傾管鮑愧無佳句敵隂何功名未遂秋生鬢空對長天慷慨歌張師愚送王公中之浙東江左當年屢辟除濯纓何事久躊蹰求才喜用衡門士應幕今從帥府書海賈舟帆來貨貝越民耕稼雜鹽漁元戎坐鎮東南境贊畫如君定有餘送陶子源巡檢之桂陽韔弓南適桂陽城武事還資藝苑英地逺夷徭皆向化時清桴鼓不須鳴壇山積翠餘仙迹湟水飛湍想漢兵到日登臨成勝賞好將風景寄吟情送趙耕道宛溪霜曉送歸棹試倒清樽話别離解纜仍歌竹枝曲過家不負菊花期肯嫌鄧禹為官冷會見常何獻䇿竒况是交逰滿臺省青雲要路莫遲遲送谷仲臯為南臺掾當年捧檄謝公城利器清才數俊英簡牘重來參幕畫風霜今起贊臺評隱之酌水心寧易子夏彈琴聲未成從此飛騰峩豸角應思松柏不勝情和姚竹居過趙忠定公故宅詩韻翊戴功成賴屏翰豈知螻蟻困泥蟠南荒地逺勞行役北闕雲深欲見難納册未占風拔木懷沙先見畹滋蘭惟公千古精忠在姦黨何殊一鼠肝挽貢仲章學士妙年稽古著華纓晚嵗蓬山益擅名太室恭祠司大禮九重讀卷擢羣英燎熏嶽鎮風塵靜歸卧雲林羽翼生東望新阡氣蔥鬱悲涼空寄薤歌聲送方嘉父連城自許敵璠璵湖海飄零氣不殊薄宦真如蕉覆鹿言歸豈為食無魚青雲交友思推轂白髮慈親正倚閭谷口躬耕固云樂祇應非晚有除書送趙明仲珊瑚文彩照華年宛水逢君亦偶然季琰能書有家法袁宏詠史動鄰船清才瀟灑方題柱窮巷栖遲獨守玄談笑相看還遽别想隨春雁北逰燕送馬彥卿相逢一笑即相忘况是黌宫六月涼解榻正依松桂影看書共挹芰荷香闌干鍾乳生金鼎磊落驪珠滿錦囊歸去重來知幾日貂裘應拂敬亭霜送趙伯淵送逺臨岐别緒長少留吹帽醉重陽秦淮倚棹秋聽雨易水驅車曉度霜吳祐肯成青竹簡謝玄不佩紫羅囊熟知二父才名盛素業承家未易量送郭右司握蘭冠豸聳班行却賦間居與世忘賈誼還聞召宣室舜欽那得老滄浪紫泥朝捧馳星夜青瑣春催拜夕郎見説羣賢方進用好將勳業佐時康張師魯送嵊縣宰儒將開藩宛水濵後人分蔭繼光塵遷官勾越垂朱紱樹表瀧岡勒翠珉山護松楸顔色喜邑栽桃李物華新公餘何以銷間日筆底龍蛇要逼真送俞槐澗歸上饒傾蓋逢君如素知廣文分氊聊自怡彩虹明鏡足吟嘯氷水玉山形夢思客裏無金意慷慨囊中有書光陸離明年八月會相見食葉春蠶文益竒謁昭亭祠至元辛巳立春日陪公亮從舅謁欵祠下獲吉徴其繇曰魚透龍門身離塵遂飲福胡氏分韻得龍字上到昭亭第一峯雲梯躡遍翠重重廟前綵仗來春騎殿上香煙繞衮龍暖轉新陽浮宿草凍擎殘雪挺喬松良辰共喜蒙靈貺拂面東風酒興濃題忠諌四御史詩卷敢論佛骨吐長虹四子相期感帝聰視死猶歸真不忝有心如面豈非忠臺端風采誰能繼史牒芬芳獨未窮天意終回頒雨露直臣昭雪沒存同王虎臣寄周千之豫昔作掾潛川千之每作遨頭追想昔逰之樂且恨千之之間闊詩以寄贈岝崿金鵝翠作峯登臨長憶與君同窮探洞穴驚山鬼淺揭溪流怯射工四海交逰雲聚散百年蹤迹路西東詩盟到老堅如石莫遣音書似斷蓬間居寄吳子彥插柳栽花足自娛老來無力事樵蘇生無鮑叔家常困死有山公子不孤花落忽驚聞謝豹囊空何忍殺青蚨貧居莫道渾蕭索客至松醪免去沽送陳公輔之新寧邑五柳從渠並舍垂雙鳬自向武岡飛宦情未許霜侵鬢草色行看緑上衣野興催詩鷗鳥近溪鮮入饌鱖魚肥敬亭後夜相思處林下唯瞻列宿輝鼠鬚筆維鼠穿窬以竊名來親筆硯豈無心幾年俯首潛蓬蓽一日掀髯入翰林湯沐已曽霑聖澤文章未見出徽音自知不是中山族秉用徒慙眷遇深凌希惠挽陳公輔縣宰清標出俗世稱賢宦轍江湖四十年才似張華能博物官同陶令便歸田青山葬地生前定縹帙遺書沒後傳遼鶴不來天地老玉簫吹斷魯溪煙挽崔芝庭鼓篋升堂與俊髦當年有志在雲霄看書得趣忘漂麥夢鹿迷蹤漫覆蕉忽報遣車從畫翣但留遺藁滿詩瓢眼中耆舊凋零盡腸斷西風楚些招挽羅德秀傾蓋相逢三十年幾同燈火勘丹鉛凌雲自負相如賦分椹人知蔡順賢講席方欣占雀冠夜臺何遽合龍泉儀刑未逺遺芳在一酹清觴為泫然汪士深題景德寺寺占陵陽第一峯寶扉珠樹碧玲瓏鶴巢霄漢浮圖頂僧舍煙霞丈室中高閣鐘聲聞逺近上方燈影徹西東一從杜牧題詩後翰墨誰能繼古風齋居遣興答施晉卿百年襟抱著悲歡晚節從容任考槃白髮已從公道得青山長似故人看經時積雨開新霽出色秋花耐曉寒欲寄新詩無别恨目隨征雁楚江干汪士明遊木瓜園木瓜名品擅江東三月花開煙雨中十里明霞紅步障數峯春色錦屏風壓枝絳蠟融成蒂映地珊瑚矮作叢秋實勝如丹頰美更期躍馬訪園翁
