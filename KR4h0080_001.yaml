body:
  text: 宛陵羣英集卷一元汪澤民張師愚同編古體四言五言宋陳天麟案天麟字季陵紹興中進士纍官集賢殿修撰嘗編易三傳及西漢南北史左氏徴節等書所著曰攖寧居士集青山辭青山崔崔白雲溶溶我疑其中仙人所宫風馬雲輿霓旌羽幢遊行太空翩然相從望而不見使我心忡我本金華牧羊之童口誦蕊笈有聲如鐘震撼巖壑無礙不通謫居下土黃塵濛濛五色之氣布滿西東秋髙露清陟彼危峯呼吸元氣精神內融嘯傲萬物後天而終梅詢案詢字昌言端拱中進士及第厯翰林侍讀學士遷給事中出知許州卒歐陽修志其墓所著集二十卷王安國敘之編修陳天麟為撰年譜宋史有傳呼猿洞古洞呼白猿寂厯不知處風激石上泉僧疑月中樹微茫認松雪髣佛橫樵路空望增爾思蒼蒼奈煙霧曲水亭鶴髮山中人疏泉鑿幽石如憑青玉案分遞白雲液泠泠濺雕俎瑟瑟穿吟席醉坐三伏中煩襟自消釋李兼案兼字孟逹孝先曾孫博學工詩楊萬里推許之出知台州居官有守既卒吏民為之巷哭罷市所著有雪巖集寄題愚齋巧鬻非善賈利穫非良農君子不自智甘與庸人同天君見獨者進退有新功忽斂藝文手反著懷袖中客問以臆對此説非易窮吾非寧武子今學北山翁奉陪攖寧侍郎逰柏山寺謁梅公墓小憩行軒勉酌蕭寺倚巖郭昔逰幾何年茲辰愜幽賞杖屨從儒先稍穿蒼蘚徑旋入青蘿煙山色若倒屣松風自鳴絃目力眩竒觀步屧信所便俄登旃檀林金碧耀修緣道旁老木拱詩翁久飛仙蟬蛻萬物表蝶夢三生前至今二百載相望箕斗懸緬懷文忠公豐碑泯遺鐫樂善如緇衣後世兩稱賢山僧矜好事華表新題璇向來委榛棘時情任渠遷原注時使君來奠梅公墓下山僧始為立華表故云先生笑撫掌此事從古然相逢一樽酒勸君小流連江梅欲浮動春光向妖妍同逰二三子舂容有佳篇歸歟不知夜霜雪淨寒天元王璋案璋字敬叔圭之弟題叢隱軒吳寬居所居燕坐之處有老桂臨窗最為嘉樹踈齋取招隱士首句名其軒曰叢隱分韻賦詩得生字棧棧曷可棲采采祗暫榮連蜷此嘉樹璀粲敷珠英翩翩佳公子遼遼懷古情植之軒楹間氣欲千巖并玄冬無零葉長夏有餘清天風發幽香好鳥枝間鳴雖乏貞松姿嵗寒未渝盟何必澗谷居而後可逃名長歌小山詞吾亦得此生夏謹齋總管開南陵栁家港諸人賦詩要僕同賦五行水潤下可導不可障孟軻譏鄰壑齊桓禁曲防李冰鑿離堆江水得安行栖筠散磨磑鄭白復其常懷哉賢牧心千載遙相望弋江經陽穀壅利資豪強吾侯一疏鑿二邑免懷襄襏襫春耕遂黍稌秋風香功因地利致惠與江流長為公賦臨河維以比甘棠梅叔章自安慶歸和盧踈齋次陶詩韻余亦就答昔别趨上都今歸自舒州方尋嵗寒盟而與靜者儔論詩精神契話舊嵗月流嗟我獨何為閉門治幽憂豈無一杯酒不得同獻酬虛蒙瓊琚贈自愧吾何修汪銖按銖鑫之弟寄徐冰壑空谷有佳人逺在天一方大壑渺江海高寒逼風霜炯炯冰玉壺粲粲雲漢章敬亭有間雲孤飛吳山旁脈脈一水隔落落參與商搴裳欲從之羽短川陸長懷哉耿不寐明月共夜光何當脫埃塵從子冰雪鄉梅德明案德明宋都官員外郎堯臣之後績學工詩見稱于世逰永慶寺尋幽扣禪關春意良可掬修竹照清溪珍禽響佳木瀟灑詩境偏往來幽徑熟不見松風亭落花空蔌蔌九日登敬亭西峯分韻得無字素秋倐云暮佳節孰與娛良朋念幽獨折簡煩相呼謂言西峯勝日晏不憚迂追隨向林麓先後雜樵蘇攝衣臨莽蒼捫蘿厯﨑嶇絶頂平且衍極目楚與吳連綿羣山羅縹眇飛雲孤採彼巖下菊酌此山中壺神交企往哲得意心自愈笑我塵寰客此樂還有無下嶺分得羣字復下丹梯來似失飛仙羣嵐翠漸相逺泉流喜重聞茨居憩落景菊觴繼餘醺晚景矚山郭獨悵歸袂分貢士源送張師聖升察掾清憲肅文治霜臺進時髦翩然黃鵠舉迹與秋雲髙伊昔來江東才華冠英曹清風動蓮幕徑氣生紫毫爰因休沐暇嘯詠出蘭臯粲粲明月珠煌煌宫錦袍因之寓竒賞慰我心鬱陶如何敬亭别無由駐輕舠吟箋寫離思華觴酌芳醪行哉茂逺業寧復辭賢勞趙孟熺雜興上蔡牽黃犬華亭聞唳鶴將相豈非榮終焉竟何若不如素貧賤至死有餘樂所以園綺輩超然見幾作神龍困于陸井蛙妄自尊羣蠅附驥尾騰騰擾晨昏韓盧多反噬那復念舊恩悲哉國士志天逺籲無門伯禹大聖人而甘飲食菲子淵真賢者簟瓢樂亹亹我輩何人哉越分犯不韙薄言采三秀獨立歌山鬼自擬招挽歌余既倣太史公五柳先生自述存悔老人序傳因更觀陶淵明陸士衡秦少遊皆有自擬挽歌輒復效顰為詩二章會邀時賢相與作巫陽招些弔此未死逰魂他日九泉目其瞑矣戊戌季秋生死猶旦夜萬古無不然縱有百年夀終亦埋荒阡況茲三彭仇幾人得百年在世苦役役百念常憂煎一朝同物化閉口不解言閉口不解言骨肉漫哀憐噫嘻重噫嘻誰能了塵緣宋玉作招魂哀傷為其師淵明擬挽歌賢達惟自悲後有陸與秦亦復為此辭今我慕先哲豫歌露朝晞幽幽石山室有日入居之親舊倘有情及在挽以詩不必待長夜假鐸樂吾尸胡晉九日登敬亭以登高無秋雲分韻得秋字夙居敬亭側登覽常靡由佳辰豁新霽幸陪君子遊依松息微倦聽泉欣暫留攀緣厯危巔指示窮荒陬培塿寧足數岱宗良與儔班荆憩雲根拂蘚題巖幽仙果滿藂摘時菊盈觴浮歡餘發髙詠興逸凌清秋心賞未云極何當復相求下山以日落羣山隂分韻得山字杪秋景易晏暮色生空山紫芝信可採丹梯詎難攀未諧棲雲期且復步月還誰當念幽賞神逰翠微間齋居有作贈同志齋廬幸高曠況與佳人俱地偏車馬絶境勝襟抱舒日與篇翰親頗覺塵事踈晴軒瞰嵐嶺緑池涵清虛苔䀶被行徑林隂芘幽居吾非傲軒冕且復得所如同張叔輿遊敬亭葫蘆沖邈居闕心賞何由散襟顔過門有高賢連袂欣尋山躡石渡清淺求蹊出榛菅稍深竹樹盡忽曠煙巒環即此敬亭勝豈殊盤谷間息影巖扉幽寓歡觴宴間視日未云暮嘉言且容攀戊申春送汪叔志之建業高士抱經濟夙齡著嘉聞披懷豁霽月為文舒慶雲蔚若玄豹姿邈隨丹鳳羣絃歌育時秀令德承先芬秦淮浮緑漪鍾山凌紫氛從遊良未遂言别徒悁勤首夏遊明寂寺良逰屬初夏逍遙振晨策逶迤松徑長杳靄煙嵐積淙流散瓊華紺宇燦金碧掃石展良宴披榛尋往迹眷賞方延佇鳴笳起將夕汪珍案珍字聘之隱居黃山盧摯雅重之汪澤民敬其為人不敢與鴈行每稱曰南山先生感興素絲墮墨池白璧有微缺缺者不復完汙者難再潔君子愼言行皎皎庶不滅絲璧誠可珍所貴完與白搖搖東園柳娜娜不自持夲非棟楹器但有猗儺姿揉之成杯棬未免與人隨嚴冬霜霰隕不得斤斧施賞玩誠足貴取材非所宜潺潺急流水雖清不可鑑悠悠行路人雖語只可暫朝菌不謀夕槿花豈待旦哲人慎交際毋貽來者嘆白石攻良玉鹽鹺錯南金明鏡賤嫫母磁石惡曲針向來㸑不焦或中朱絲琴又聞牛頷鐸可諧大樂音用舍非不公美惡在所任故人在天末三嵗不得書欲寫心中事緘之問闊踈杳杳雲中鴈沉沉江底魚此意竟莫達抱恨當何如貢奎案奎字仲章父士濬贈廣陵侯奎任池州路齊山書院山長擢應奉翰林文字泰定中拜集賢直學士後贈廣陵郡侯諡文靖所著有雲林小稿聽雪齋記青山漫吟倦遊集豫章稿上元新録南州紀行凡百二十卷寄吳子彥憶昔溪上别于茲倐經年胡為不嗣音令我心茫然燕州六月旱火雲蒸晚天飛蝗密如雨桑麥浮黃煙秉筆事詞翰愧非時政先側聞江南雨官途漫成川豈無妻子纍萬里何由前對食不能餐枕肱重憂煎蒼蠅何營營厥類紛牽連緬懷嘉樹底披襟弄清泉雲林有高處盍賦歸來篇答陳華仲海上三神山上有學仙侣泠泠紫簫聲吹作飛鳳語回飈蕩溟海散落成煙雨豈無知音者一振九苞羽持之獻天庭上以奉明主張師愚案師愚字仲愚一字仲淵與弟師魯皆好學工詩嘗從汪澤民逰澤民稱平生畏友有二張云古詩晨選期門士大獵南山陽白日照旌旗咫尺臨清光之子才且武結髮在戎行控拳拉羆虎餘勇殊未央回車宴五柞舉烽令行觴禾黍被中野松柏生髙岡借問何所思所思在冀方彼美冀方士安得同翺翔峩峩切雲冠奕奕芙蓉劔揚揚徒旅繁濟濟駕紫燕行行向雙闕去上未央殿君明臣亦良四海皆清晏齋房多靈芝郊藪鳳凰見羣臣亦何為稱功勸封禪中夜整冠帶覽彼明月光屏營不能寐憂心獨怦怦危坐待明發牽牛直南榮盈庭樹蘭蕙芬馨日凋零客行隨所適感物懷故鄉朝發鴈門道夕入蘭臺宫佳賓會若雲列鼎吹笙簧終嵗極燕樂保已有餘慶仙人降瑶序風露清壇場朗詠玉書文遙上緑雲章閶闔啓中夜五色垂景光霓旌導絳節授以長生方湛然守中扄不迎亦不將瓊漿酌天和玉芝茹春香手種蟠桃花坐待三千霜相從廣成子鸞鵠參翺翔送楊待制玉堂邇丹扆代言煥絲綸求才極清選擢用先席珍英英儒者宗顯秩宜致身窮理伊洛源振藻班揚鄰飛騰霄漢髙輝光章綬新驛程催舉棹雪消江水春言路方四闢啓沃須搢紳送陳公輔宰新寧都梁介南越溪逈山崢嶸銓才得賢令慰彼逺人情追餞增綢繆梅雨時初晴雲帆洞庭濶蘭渚瀟湘清劇煩屢奏最邑政胡難成惠行猺俗安信孚庭訟平勿謂茲土陋歸興悠然生送秦祐之照磨辟南臺掾騄駬志千里雕鶚厲清秋佳士逢盛世飛騰良有由河南忠義家奕葉承箕裘甫佐江東幕旋應南臺求將母仰微祿束書上輕舟知友豈不懷捧檄焉能留華要在咫尺行行接英遊冬夜讀書寒齋竹户閉風葉鳴庭除焚膏取深夜隱几讀我書虛懷縱探討忘寢獨卷舒名節重九鼎富貴浮雲如伯夷隱首陽武侯卧草廬仲連却秦軍子卿抗單于聞者咸歎息偉哉四丈夫令名垂無窮擊節良起豫尋西郭新亭遺迹芳辰喜清暇㩦笻出西郭登髙一以眺山川如綺錯昔聞趙宣城築亭候賓客嘉林蔭結構翠嶺照丹雘逢迎盡賢士冠蓋擁阡陌況有謫仙人竒文刻金石我來訪遺迹但見丘與壑斷甓亂榛莽隤址暗松柏五馬不復來樵歌空躑躅人生一世間富貴不盈握所以崇令名沒世耻寂寞登響山晨逰吳相圃登陟稱幽情荒徑何盤紆連岡抗嶔崟覽觀興未已遂上雲煙岑曠野望原隰碧潭瞰淵深舉觴愜清賞分籌對高吟征鴻翔寥廓倦鳥集故林俯仰久延佇感慨激幽襟祀文昌後飲福分韻得金字鵾鵬擊滄海鸞鳳翔丹岑由來聖明朝英髦藹如林河清啓文運賔興播綸音皇澤何汪洋弓乘相招尋潔蠲共精禱光昭儼來臨工祝致神釐燕毛羅佩襟士懷經濟業貴比雙南金相期在霄漢朂哉思自欽又代道士作分韻得誥字弱齡寄塵外林栖誦真誥恬淡依皇靈壇場躬汛掃仰欣文囿英懷糈致心禱蜿蜒龍駟翔暗靄鸞旗導弭節臨瑶席肸蠁若相告爾士際昌期豈弟豫所勞學海觀波瀾聖域詣壼奧秉心無或違青雲斯逺到再拜授神言珍重瓊琚報送吳子彥縣丞之分宜任宜春麗山水遊宦多賢英康樂啓侯甸昌黎刺州城今子贊屬邑欲往思巳清揚舲動行色執手别友生名宗夲台鼎奕葉垂華纓墨綬雖未顯象簡亦荷榮秋深黍稷熟雨霽川原明捧檄有程期不日揚嘉聲送牛仲庸樗散非世用編簡聊自娛寧知城市喧似入山林居之子不遐棄跫然造蓬廬照夜覩白璧籋雲逢名駒清言遺榮利雅尚敦詩書依蓮暫試吏彈鋏匪為魚今晨遽云别趨庭念扶輿泛泛季鷹舟飄飄老萊裾耘耔有豐嵗脂牽無逺途漢庭召英俊行當待公車夀王子榮舊業傳孫吳戎行事馳驅不願萬里侯解組歸田廬中嵗敬亭下高卧寄一區誰謂環堵陋而多長者車手攬芙蓉花口誦漆園書神完守彌固纍遣心自舒松喬雖夀考比之應有餘張師魯按師魯字叔輿仲愚季弟兩領延祐天厯鄉薦上元與諸彥登開元寺塔得忽字漢家祠太乙燈火夜靡歇流風屬上元照映金蓮發我思鴈塔登飛興生超忽聮步青雲梯仰見黃金闕霞珮繽相從天榜煥已揭舉手謝杳冥當期探月窟登鼇峯賞眺得鼇字佳賞屬芳節招携有時髦靈峯何屓屭遇勝欣登鼇翩翩向金闕濟濟朝仙曹詎意闤闠間遂升霄漢髙玄圃耀瓊蘂天風吹碧桃多謝陵陽子引我同逰遨始春與汪叔志送仲淵兄之建業登峽石飯别雙溪波巳緑泛泛動春槳雲林迎睇來峽石褰衣上徑隘始通履磯平忽如掌行舫移中庖班荆代函丈淋漓蒼峭題披拂清幽賞采其興未極感則心俱往幸有同袍子慰我連枝想拜言遲還期庭樹踈隂長送陳公輔宰新寧壯志輕别離猶念一笑歡况此平生交解携情所難從知有常操可以持嵗寒何為往鳴琴渺彼南雲端明時枉長才欲俾逺邑安滿壁雖可尚珍重在加餐歸來涉沅澧贈我芷與蘭仙遊山神祠仙遊杳不極山夕景獨殊丹氣發空翠天燈照連珠下有神之宅何年託蓬壺想爭隋氏鹿赫赫雄萬夫提劔起草莽搴旗護枌榆竒功未盡賞靈異終弗渝祝釐賽田畯撫節降楚巫羽人孰可仍我亦懷英圖芬薌乍成霧杯珓若合符歌此謝冥貺送迎神以娛謁敬亭祠於山中留憩隮勝煥飛構爰宅山之靈雙流下委輸千峯上岧亭揭虔諒斯在翼翼瞻神庭豐殷降祥祉招携奠芬馨靈鼓坎巳奏真馭來冥冥精誠一云展謀野戾巖扄鳥鳴芳節闌谷暖柔桑青欣此遂嘉賞晤言遺醉醒指景向城闕還期學延齡烏聊山神祠龍舟抗錦帆天下逐隋鹿雄圖江浙上千里瞻左纛竟想虬髯姿挈地歸荒服英風不可泯血食有遐福錫誥啓王封祈年謁州牧氣和餘沴消雲委嘉生熟我登烏聊山祠宇炳紺緑揭虔禱靈莢閲繇得嘉卜洊攀丹桂枝似愧青苜蓿神意倘終惠親來報工祝東郊逰宴苔徑碧新沐忽動幽人履瞻林感初榮緣澗尋芳芷江鴨來充庖山杯聊泛蟻眷言素心友相期弄煙水羣彥惜流景探幽來窈窕煙荑柔緑微林户新風繞執袵采嘉萌張羅獻春鳥相歡且觴詠抗志浮雲表登麻姑山仙山碧玉梯千仞凌紫氛笙鶴杳何在披懷觀八垠乃知境自殊不與人世聞丹爐暖勝雪劔匣寒生雲道成遂西逰從此超凡羣瑶池擘麟脯日佩青霞裙我來採瓊螺效古誠殷勤虛谷語相答渟潭笑成紋原注山頂有丹爐劔匣下有笑泉又産小石螺如玉神交向悠邈還期脫塵紛珍重謫仙子高歌播清芬暮春懷蘭亭修禊春序忽巳晏間齋悄沉沉林樾含清晝時禽變流音景曠文墨牽感慨還盈襟昔人遺物後嘉會在山隂高風激頽俗竒藻照斯今我願追往躅誰來同賞心擬新霜感秋氣日以肅秋風日以涼攬衣起晨征行行履新霜新霜亦何感涕泗出衷腸所念慈母恩天地同久長無能致祿養空負觀國光盛德莫云報此心終未忘況承祖澤深溉植流餘芳朂哉三聖書家學安敢當幸逢文運新刷耻期前行身躬匪叨榮裒贈有典章庶以慰冥漠松柏增蒼蒼天乎鑒我誠新霜多感傷九日祭禰玄月物咸遂霜露亦降之戚然念先德報本良及時敢裁追逺情禮得伸吾私忠養夙所關致力猶在茲齊恭倍仲氏佳節修常祠潔牲秩升俎寒泉湛盈巵原注時禁酒庶品復芬苾神其或來思利成拜嘉慶衆餕羅參差慈母且解顔兄弟豈不怡所願濟斯義幽明諒難欺暮春懷鍾山作夙尚厭紛雜鍾山愜逰盤弄泉起清思聽松生夏寒不抗青雲步賞心良未殫恍如歷牛女翩若乘鴻鸞遂超吳會表始見方儀寬荆襄接逺蜀江淮阻飛瀾感往空自戚適今宜盡歡馳觴宴碧落發藻芬紫蘭信美非鄉土眷然歸念干寄謝凌崖客無言春意闌九日登敬亭西峯奉懷仲淵兄得登字佳節雲雨變扶光慰晨興心期當採菊塵外欣携朋童冠亦云集西峯遂同登欲觴憩懸石靡䇿攀垂藤黃山菡蓞出淮海秋華澄酣歌弄萬象高步凌飛鷹原注俯視飛鷹八九方盤旋山半方戀瞻望逺如何煙景凝仰哲得遺賞逰仙浩難憑所悵親愛隔頓令離念增乘風倘吹帽知子升鍾陵柏山僧房宴集雙林翳南郭雨餘湛煙華始愛嵐嶺霽更欣塵雜賖澄流現真照間庭雨空花良宴文墨親追逰喧景嘉適志形俱忘尋幽慕非奢懷哉九泉士芳馨播幽遐柏山園亭宴集得樂字伊余幸寡營心期在林壑矧此昆友間獻嵗及行樂昔人種柏地精廬抗南郭玩碑得竒篆展墓薦清酌永想玉山姿何由起冥漠雙羊諒匪遙追嘗宛如昨羣物恱熙陽孤芳厲華薄山亭一流憩觴宴欣酬酢方以野勝留寧知夕景落良會當嗣今允矣敬亭約原注叔志又約逰敬亭吳鍈案鍈字子彥宋丞相潛曾孫以父總管寶儒蔭仕福建鈔庫提舉厯耒陽知州夜坐微月耿窗影回風遞鈴音幽子方獨坐警此中夜心湛然體太虛不受塵滓侵明朝接世事何必論浮沉杜門杜門養我拙將謂得自安豈期窘人事朝夕生百端東家子乘龍西家女乘鸞試將謀諸婦婦言良可嘆子不義居鄉而以廉居官今茲用不足羞澀將誰看我常鬻簪珥日為治杯盤上堂奉我姑怡然有餘歡請君秉素節瑣瑣毋相干汪士深案士深字起潛謁昭亭祠靈祠俯江國棟宇依層巒千峯逺岧嶤二水渺回環昭明肅清境髣佛聞和鸞靄靄集嘉祉芬芬奠椒蘭精誠一云展遐眺憑飛欄昔賢有高躅寄墨青雲間瓊瑶刻蒼翠筆勢回翔鸞神逰巳冥漠馳情空長歎高峯一回首日落天風寒送李一中任西臺監察御史黃鶴九霄志神駒千里蹤乘時一超忽庶類寧與同英英青雲彥姱節凌高松懸弧懋逺業力學收竒功登敬亭西峯得雲字天秋敬亭碧步隨高士羣幽蹊入逺谷丹梯造浮雲良辰景澄曠環瞻渺無垠天際淮岫列林杪川流分山水豈不佳塵世何紛紛我行得先覺意會同一欣華觴獻甘醴黃花泛清芬題名寄巖石詠歸當夕曛下嶺得落字尋山賞未厭暝色生泉壑遐心羡雲間歸步隨泉落嵐翠耽餘景田廬成野酌行行月侵衣相携向城郭
