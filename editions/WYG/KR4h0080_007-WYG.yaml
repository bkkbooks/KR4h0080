body:
  text: 宛陵羣英集巻七元汪澤民張師愚同編今體七言律宋李含章武陵䕶戎林亭修篁簇徑出林椒可與逰人避俗囂曲檻隔花安筆硯小窻延月伴簞瓢紅藤引蔓移山豆緑葉分葩植水蕉到此每憐清氣别可堪寒夜雨瀟瀟寄題元長老林亭聞說幽亭氣象寛何須基構入雲端平瞻一郡連山翠逺矚千門枕水寒風拂石床松子墜雨籠莎徑栗花乾遙知出定牽吟夜只欠清猨嘯碧湍漁家數家茅屋枕漁磯歲歲生涯在𣺌瀰雞犬怪人奔竹徑兒孫逢客倚柴籬壁懸蓑笠殘煙雨門對溪山閱盛衰一曲新歌一舷月夜深來往碧漣漪贈内翰王同年原註王文正公旦與公同年友王為内翰在真宗即位初徊翔青瑣巳多時四海歸榮更是誰通籍禁中參鳯閣司言天上煥龍墀修文禮樂源何大振筆雲雷澤益滋若把王褒頌勲業未如際㑹遇昌期河北行為儒還解着征衣逺戍沙連白草齊鴈陣不衝羌笛怨狼烟㣲認塞雲低蕎花露濕堆空塹蓼水泓澄截古堤漸近界河分内外野禽嘐戛路東西梅詢疊嶂樓謝公城上謝公樓百尺闌干掛斗牛碧瓦萬家煙樹密蒼崖一檻瀑泉流波光灧灧前溪滿刹影亭亭古寺幽此地近除新太守緑窻明月為君留李宏案宏字彦恢建炎中吕好問知宣州得士四人詹友端周紫芝王相如及宏每讌集必與後歴官轉運使逰天休觀道流索詩霓旌羽蓋下飛僊名掲司真列洞天一𣲖銀河懸落水數峰石壁鎻霏烟潭心雷殷龍應出井口風廽虎未旋原注山有雷潭風井端欲相從老巖壑凌雲已覺意飄然陳天麟壽洋川李守昌諤二首桂子風髙瑞靄浮曉來無處不懽謳共懐襦袴歌亷范更指龜䝉祝魯侯風月莫辜三十詠星霜行閱八千秋皇家正重惟良寄衮服歸公正黑頭朱輪畫㦸擁髙牙散作棠隂十萬家漸向瑤堦對紅藥長傾玉斚壽黄花僊風自是騎鯨客逸興行飛犯斗槎誰為淮南門下客願隨鷄犬上雲霞用齊正韻送叔勤歸湖北霜㸃螭坳侍紫皇髙文大册玉鏘鏘傳家信有青袍物當代爭推古戰塲故國未應窮地脉難兄先已破天荒相逢若話情親事分我朝回滿袖香憶舊西湖當日雨如絲尚記移家去國時髪短自憐今種種印懸那得更纍纍身如烏鵲空三匝家似鷦鷯寄一枝萬事此心俱不計尚容開口細論詩席上和統制傅公韻原注公名鈞字子平遲遲春永晝如年芳草池塘屬惠連一笑誰云今易得四并須信古難全山圍錦繡將軍樹雲遏笙歌刺史天不向風光共流轉恐辜柳絮與榆錢原注四并乃當日景是日太守陳公亦出郊往來山中除夕偶成呈同舍兼簡陳仲恕東皇送煖下青都雪在梅梢半有無爆竹舊聞驅罔象傳杯今怕飲屠蘇暗中石火頻過眼忙裏銀絲欲上鬚不解玉堂供帖子雙扉聊與換桃符又次前韻積隂元自宅幽都昨夜東風一掃無玉殿仙班搖雜珮銀罌御膳染香酥柳縈翠帶方眠眼梅褪紅粧已露鬚拭目太平知有日兩宫勤儉過祥符林宗放贄奉使總領大卿昔賢兩手并擎天鼇極功成勢晏然宗廟鼎彜刋祖烈相門衣鉢付家傳藍田種玉連連好滄海遺珠顆顆圓六合共知推晝錦雲來重為拂青氊賀俞婺州除左史報政天邊美譽新十行細札下嚴宸逢人政爾詢司馬從俗何由借㓂恂制勝萬全端有道折衝一㸃是精神向來魯國多男子此日朝家特用真次宣州太守韻雙旌迎曉指林廬五馬逢辰政得輿西掖舊裁天子詔名山今睹帝王書胸中霽月何明甚筆底清風更穆如衮職還須補天手徵黄那復更躊躇再次韻肯將苛政削民廬好把寛仁答乘輿襦袴賸誇今日富春秋欣見有年書門施水薤何須爾庭臥桁楊只晏如擬頌中和獻天子鯫生無語却躊躇和龔太守廵江囬署之作防秋纔過又防春帥守憂邊笑亦顰五馬去循江路穩一帆囬帶雨潮新知兵儒將功無敵有道諸侯守在鄰籌勝名樓瞻手澤阿翁世業肯沉淪原註龔守先世守是郡扁樓曰籌勝吳潛桐川道中咿軋籃輿拂面風桃花倚路笑迎逢黄鸝囀處風篁密白鳥飛邊煙樹濃日午暫休欹客枕年饑忽喜聽村舂鄉音接續知家近尚及春犂伴老農和章子美閱武見貽事業諸公鬬長雄非才只願課田功誰知絃管江南地漸有弓刀塞北風大獮未須搜猛獸先驅聊用習驕驄還知武備資文事要在人心可即戎李孝先春日有感雨歛輕寒淑氣囬曉街清霽斷浮埃風髙柳倦終朝舞歲閏花遲數日開歸夢每逾千里去逺書新過萬山來旅情官况都無賴强對韶輝殢酒盃王文資按寜國府志作文質䞇王五峯察使維石巖巖有五峯繡衣直指大江東觀風要集流民鴈察吏還從御史驄天遣梅花迎使節春融芹藻到儒宫澄清天下無餘事歸衮當如魏國公李兼回次采石千帆東下勢連檣控帶河山自一方塞角凄風營戍逺野花濕雨墓田荒落霞孤鶩江干濶去馬來牛歲月長老我聲名無一遂征衫藍縷鬢蒼蒼謝當塗陳舍人饋姑孰春門巷春風翳草萊筆畊無藝甑生埃空成洛下書生詠敢望青州從事來洗盞首供堂上夀留尊更待月中開陶然竟堕難名境疑是凌歊百尺臺晚春筠牕幽獨静亡鄰坐睡從吾一欠伸綠樹清圓宜静晝孤花寂寞照餘春時拈栢子燒銅鼎旋碾茶團瀹玉塵在昔芻蕘猶足採獨慙無用養閒身送交代髙丞天涯客裏送人歸恨絶青青楊柳枝細雨杏園摩詰畫春風花㟁少陵詩九天掄擢堪先卜萬里功名莫後時江上豈無西到鴈平安數遣故人知簡丘倅即次韻先生志尚直明廬庀職毋嫌外且疎聊向江城紆驥足行趨禁闥侍鸞輿河陽花樹曽親植魯相葵根欲盡鋤從此把君詩過目絶勝厚祿故人書胡榘挽莫與倫三顧無人憶草廬藻江文海竟何如馬卿早已羞逢掖狗監誰能薦子虛曠達嗣宗貧嗜酒清髙元晏老耽書南州人物今如許深惜霜林一夜疎劉有慶鍾山蟠龍垂顧飲江湄臥䕶宗祧彼一時馬渡巳嗟南國蹙猿驚何暇北山移郊壇曽祝千年運塔廟空留異代悲北望中原形勢盡太平草木亦熈熈元王翊龍和李治中韻英雄老去覺顔凋約矢無書可射聊春暮流光嗟逝水山深幽夢付回潮翠林鳥聚雲帷合清沼魚吞雪絮消我欲雙溪釣煙雨彩虹聞已跨飛橋原注城東橋新成再次韻青松要見歲寒凋一笑人生樂亦聊玉樹怕聽吳苑曲銀山空吼浙江潮年光荏苒鬢毛改世路﨑嶇髀肉消天道乗除春又去杜鵑聲在洛陽橋熊不易綿坑雨夜投文秘監夜經十里綿坑谷虎嘯風號客䘮魂行有石頭偏雨滑去無人跡更天昏鳥啼僮自聽為鬼山盡我還知近村急報扣門文祕監旋炊香稻為開樽過符川有感神宅仙棲倚翠虛何年流水潰焦圩山留阿育當前塔潭秘旌陽去後符芳草羅生荒市緑髙門零落舊時朱丘墟此地渾閒事禾黍秋風滿故都水西寺栢山廟裏神松古裴相園中僧塔髙行馬不旋陵變谷蟄龍一起海生濤樓侵林杪天盈尺雲接溪頭水半篙隔岸人烟秋色暝一簾疎雨正蕭騷張浚明題土山寺二首出城十里囂塵逺此地登臨是勝逰山勢西來分鳯爪溪流南下繞龍頭瞿曇殿聳仍孤刹丞相祠荒但古丘獨倚闌干人不㑹霜風落葉正蕭颼平瞻蒼翠俯潺湲詩景分明指顧間地接郊坰換今古秀鍾人物在溪山春風跨馬銀鞍穏夜月騎牛鐵笛閒從昔陵陽多俊傑要知天運大循環原注梅詢侍讀逰此曽乘銀鞍馬李含章隱此常騎牛吹鐵笛送表兄從戎丈夫結髪去從戎臂健重彎舊角弓襄漢兒童知勇力江淮草木識威風平生未展安邊策一念常懐報國忠指日紫袍金帶貴老天元不負英雄朱得先上郡守䕫龍接武上亨衢自是君王乞左符雨露湛恩霑紫綬乾坤清氣滿氷壺陳留合使飛蝗避原注王况為陳留守蝗髙飛去周道誰知我馬瘏不有字人心獨苦誰宣皇澤沃焦枯次馮介溪閒居韻竹屋松窻杳靄間林猿沙鳥共溪山種花長占青春好讀易堪消白日閒隱處雲泉思共酌夢中烟樹正相關他年容我狂吟否獨立斜陽拄杖斑王儒珪上御史繡衣將指到南溟驄馬驅馳萬里行玉鑑氷壺元瑩徹蠻烟瘴雨喜澄清簡書程度歸鍾阜原隰咨詢過謝城共慶飛龍新御極好陳民瘼達聰明王儒珍送友人之杭求仕六月塵沙苦欝蒸連朝送别意相仍曵裾慣作侯王客推轂寜煩玉帛徵顧我疎慵懐隱豹憐君矍鑠逐飛鵬孤山清氣千年在到日尋詩為一登王圭送李㢘使之荆南二首火落金天爽氣浮澄江練浄引仙舟霜威此去清三楚霖雨行㸔遍九州銀漢星槎當好夜渚宫烟樹正髙秋熈朝圖任須元老未許周南此滯留儒林分席春生座射圃旋車月滿溪暫憩棠隂人愛樹無言李下自成蹊恩光新拜宫壺賜姓字多應御筆題但得明良千載遇腐儒何恨老幽栖上李亷訪大使清於氷玉重於山愛國憂民兩鬢斑霖雨待均環海内德星暫出斗牛間陽春有脚能生物水鏡無心自照奸從此棠隂遍南國豈伊寒士獨歡顔壽阮若山總管岸幘西風氣自豪從將了事付兒曹也知客裏思鱸鱠何似山中把蟹螯九日黄花如有約百年青眼為誰髙溪山大好登臨地可但餐英賦楚騷王璋聞疎齋盧公拜集賢之命以詩寄賀洛下秋來傳近作日邊使至報除書乍聞北闕多新貴重直西垣識舊廬陶謝風流連白社應劉文字盛黄初深知有意沉㝠者自是無心賦子虛寄戴帥初原註時授信州教授重席先生安穩無上饒人物近何如李君㑹有新篇什謝氏誰為舊學徒原注李明通謝疊山皆廣信人曲士幾曽闗世道斯文豈不在師儒宣州日日有來使莫寄靈峰水玉珠和疎齋韻送丁太初叅議官曹清切遴才賢共喜明時理化絃燕市驥來媒樂毅遼東鶴去羡丁仙胸中載籍經綸地袖裏封章咫尺天紫禁烟花春漸好人歸况在鴈歸前上姚亷使生日中朝文獻數三姚最說元方有鳯毛奎璧光芒相照映神仙地位自清髙南州已賀開新府西掖遄歸占舊巢從此漢宫陪宴侍不應海上壽蟠桃次韻即事莫為清醪憶故鄉喜聞社甕響糟床鱸魚未出江頭網螃蟹初登步下艎醉罷隣牕雞撲碌夢囬空案䑕跳梁誰言處士無供具也得山童㸑欲凉貢仲章奉禮歸自都下戲簡少年如玉更清才自致青雲不用媒禮寺暫抛文竹去慈闈齊慶綵衣來鵲知人喜移時語花為郎歸滿意開好趁芳辰娛色養日邊應有使來催潘季通生日見君童穉便情親况復郊居作近隣漢相不將金遺子潘家偏得玉為人枯桐撫罷心逾曠秃筆拈來畫有神更趁妙年培逺業佇㸔三鳯出風塵小閣呈敬仲兄小閣纔容六尺牀苦寒聊與蟄俱藏少安書巻偏能熟謾揷瓶花已覺香桑火旋分蒸秫竈松風時和煮茶湯閒中有事能談妙不問維摩借道塲貢南漪生日薰風吹送十洲仙仍占湖山小隱天歲月只今書亥字精神依舊似丁年園公志操雖辭漢季子才名巳重燕笑遣新詩致樽酒髙門賀客不持錢許晞顔贄監郡公金章紫綬照南州身在陵陽最上頭曉雨桑麻吳地暖西風䆉稏楚鄉秋朱轓到處行雙鹿緑野何人佩一牛見說御屏題姓字崇班早晚侍前旒汪鑫和韻送陳慈湖狀元澹烟衰草斷吟魂一舸滄浪送客頻商嶺今聞迎漢老武陵誰復是秦人九秋風月詩應好萬里乾坤道未貧只恐魁芒天漸逺明河從此許誰親趙艮巖知縣歲晚見訪龍種當年舊帝家飛鳬歲晚尚天涯忽傳詩句心先識各問流年鬢欲華村巷春風喧爆竹燈簷夜雨飯胡麻東㳺故舊如相問為說桃源學種花贄徐容齋憲使桃花深處是吾廬半世豪華等傳車夢斷舊蕉曽有鹿歌殘長鋏信無魚愁吟獨感庚寅賦歸去重尋甲子書聖代喜無封禪事空山容得病相如宿𤓰州客愁秋意𣺌無窮蘆葦瀟瀟故壘空山脉南來江欲斷潮頭東去海相通斷雲歸鴈淮天碧落日啼鴉楚樹紅應是𤓰洲笑飄泊十年三度落征篷金陵懐古呈吳山西宫講虎戰龍争古石頭山河歴歴似中州六朝遺恨千年在諸老清談萬事休落日藤蘿梁寺晚寒烟蔓草晉陵秋東南歌舞英雄倦無復新亭泣楚囚辭洪損軒憲使行姑蘇道中潮送輕帆過淺沙重重溝港響衰葭燕巢未穩元非幕鱸鱠雖肥不是家風急棹歌穿荇葉日斜橋影臥蘋花垂虹亭下滄浪水不與愁人洗鬢華汪銖陶𢎞景故居懶著朝衣此隱淪山中宰相至今稱仙魂自入蓬萊島故宅皆歸蘭若僧種藥地荒人不見煉丹井在月空澄誰知更有幽栖處茅洞烟霞鎻碧藤遊金山寺偶向西津喚渡船金山勝處訪髙禪人間車馬去無路水上樓臺别有天江樹日晴孤鶻下石潭雲暗老龍眠鄉僧愛客留煎茗旋汲巖頭第一泉楚城九女墩次胡月巖韻楚城山下草離離前代興亡不可知祗見一墩封馬鬛争傳同穴葬蛾眉簫臺鳯巳分雙翼梧野龍猶入九疑把酒問春春不語野花野鳥自傷悲春仲寄鄧處壺髙臺歴歴見闗河悵恨誰憐别後多雙鬢盡從愁裏老一春半向雨中過溪隂殘雪黏青樹江上微風起白波料得湖天花事好無由分賞欲如何文敬所自杭歸且聞學飛昇之術和韻奉寄夢到觚稜日已斜集英曽得對重華海邊古說瀛洲路圯上今無博浪沙已約詩人吟夜雨更尋道士服朝霞馬蹄得意春風路今度重來不見花上御史列位南臺肅紀綱清氷出壑凜寒芒乗驄秋入青山道執簡朝凝白紵霜鷹奮西風初搏擊鴻安中澤肯飛翔此邦民瘼如堪畫異日須將入皂囊
