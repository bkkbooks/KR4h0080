body:
  text: 宛陵羣英集卷十一元汪澤民張師愚同編今體五言排律宋陳天麟送太守李公亂花翻陳雨飛絮轉輕毬别思昏如醉征鞍挽不留職循今列郡秩視古諸侯當代人爭仰惟公政最優洋川佳景物勝迹舊經遊未定中原擾猶懷傍塞憂九重爰錫命千里藉承流德逐祥雪偃恩隨瑞靄浮帶刀還隴畝挾纊動貔貅烽柝開邊月犂鋤慶麥秋二天舒士氣五袴沸民謳虞氏三年考河南第一州霜臺方薦墨黼座想凝旒早晚頒綸綍東西走置郵遲遲姑去魯几几定歸周明月湖光逺凌雲氣象幽煙波浮畫鷁雪浪繞烏牛好逐桃花漲輕飛竹葉舟徑歸調玉鉉莫待覆金甌賤吏傷萍梗終年仰庇休龍門曽御李驥坂會依劉不作癡兒女孜孜話别愁元王圭送汪叔志赴省試才撤秋闈棘香名動地傳初無三獻事竟作一鳴先抱獨遺經在姸精坐席穿品題歸月旦徒步起災川秀擢江南日羣空冀北年倚門占鵲喜同社羡鵬騫聖代方尊士諸公急薦賢修程須努力莫後祖生鞭王璋濟川橋成二水玄暉郡雙溪太白詩江山遺迹在惠政大賢知纍石砌湍瀨飛梁跨渚涯仙宫鰲贔屭星漢鵲參差不礙乘槎客翻愁踏浪兒人從袵席過功類鬼神為利涉通千里歡呼共一辭吟詩欲題柱記取落成時送傅擴齋廉訪滿秩歸長安二十韻南國黃華使東維列宿光選輪應近侍揚厯且殊方地鎮江陵重天連蜀道長班荆非客宦負弩盛朝章問俗魚鳬國傳杯杞梓堂舞看渝水曲歌倩竹枝娘叔子心期逺文翁政術良巡巡持漢節處處即桐鄉瑶厯更新號崇臺整舊綱玉驄鳴宛水軒鶴憩陵陽落筆霜威重隨車雨氣涼澤中集鴻雁道上屏豺狼舉措消羣枉封培惜衆芳春回魯宫藻陰滿召公棠有客棲南郭無人薦蜀莊分庭寬禮數退食問行藏古道今安有深心矢不忘方欣為李御遄報促曺裝送客聽雞唱征帆拂雁行楚江楓葉赤陶宅菊華黃未就長安第還分漢署香他年懷舊德悵望繡衣裳何儒行泮宫丁祀二十四韻禮樂皇元盛文章孔道昌垂旒尊視帝居扆靣當陽冠帶三千子衣裳十二章四公傳道統十哲領儒綱離火丁初吉春秋仲月良羣侯霑教雨憲使凜清霜光赫開宫殿聲明發序庠衆官朱紫列多士佩襟翔庭燎東西廡軒縣上下堂糾彈觀儼肅贊引步趨蹌濟濟咸端笏峩峩或奉璋鸞刀毛啓血龍勺酒流黃燃燭紅輝合薰爐紫霧揚豆籩分左右簠簋辨圓方腥熟牲殊體浮沉齊並香告神詞具祝奠爵幣承筐玉振笙鏞間歌登雅頌揚九成音律洽三獻色容莊隆殺儀如式尊卑序有常聚精誠有感錫胙福無疆剡剡疑來假洋洋若在傍廟隂聞瘞坎門外散班行湛露丹墀曙清風泮水涼斯文垂令典日月與天長梅實送王繼學廉使天地開元運山川育俊良皇猷資黼黻令德著圭璋列位登台鼎垂紳佐廟廊設施崇禮樂出處繫綱常報國心能赤憂民鬢巳蒼存誠常懇懇求道亦皇皇不向炎荒去誰知姓字香蘇公往儋耳韓子適潮陽歸斾輕車熟還朝晝錦光錫恩承雨露出使領風霜儀鳯朝仍見妖狐夜亦藏七州煩勞來六轡快騰驤暇日宣城郡春風宛水堂坐邀山淡淡卧聽雨浪浪惜别詩成軸興懷酒滿觴攀援留莫住九萬志難量願早登樞要為霖遍八荒附聯句二首張師愚大德八年六月既望余與汪叔志梅叔威及叔輿弟柏山寺納涼聨句雲林近南郭瀟灑共追涼青稻花凝雪仲淵新篁節傅霜幽尋過紺宇叔志高坐得虛堂僧供來山茗叔威賓筵列翠觴桃如尼父雪叔輿瓜為邵平嘗覔句題蕉葉仲淵圍碁到竹房割雞勝異味叔志二胾列羶薌風入纎絺爽叔威隂移白砌長塵龕金像暗叔輿柏壟石麟亡鈴語朱樓迥仲淵輪摧白塔荒題名漫素壁叔志殘碣卧修廊緑愛垂垣草叔威黃炊入夢粱嘯歌遊物外叔輿山水樂吾鄉學道期顔閔仲淵論交有范張總無簪芾纍叔志未覺歲時忙盤谷思同隱叔威濠梁意兩忘荷衣元解製叔輿星劔但深藏入室芝蘭秀仲淵聯輝棣蕚芳短才慚附驥叔志高詠笑啼螿俯仰懷吾祖叔威空山自夕陽叔輿城東晚步聯句餘酣尋晚徑覔句費幽思戴笠身歸寺仲淵持斨鬼護祠渚萍霜後紫叔志野菊雨前衰緩步忘歸去叔輿兹遊豈有期仲淵今體五言絶句元王圭題毗陵於生藕花蓮房藕絲一何長蓮柄一何短應似懷逺人愁多寸心斷離離秋蓮實采之贈所思香葉不成圓苦心中自知王璋折枝月桂月樹漫同名春風偏自知姮娥空老去未識此花枝題錢劉兩御史家藏熙寧爭新法諫疏卷末忠言雖不售百里仰高風為問臺中妙何人繼兩公稷契功安在申商術亦疏虛名誤人國介甫讀何書汪銖畫蓮捲緑新如染酣紅睡未醒真疑貯風露不似出丹青張師愚檜柏同本圃人植雙樹枝葉翠相繚遂使真心合歲寒託綢繆張師魯留山中倚澗惜魚逝升丘送鴻歸遙林暮色至漠漠上人衣西嶼揚舲渡湖西孤興得幽討水木淡秋隂天風一揮掃山齋移石列蒼峭生成喬嶽勢開軒對此山渾識太古意蒙軒流水度竹間未知何所適此時當自謀會見通潮汐濯清濁水豈能染亭亭風度間乃知君子愛不在顔色間聽雨舫雨侵金版舫釜豆裂清響不滴離人愁誰來伴孤賞採菱舟舟人弭蘭棹采采供菱黃我意豈在物以助心清涼汪澤民金陵别友煙草六朝夢鶯花三月遊秦淮風雨夜楚客别離愁汪天驥案天驥字樂全涇人為元妙觀道士能詩夏日間行偶爾行行去山家半掩扉暫來松下立苔色上人衣蕭澥原注金精山民戍婦詞不恨妾空閨只恨郎飄泊夜月卧沙場誰道從軍樂附五言絶句按永樂大典內凡係失名失題無考者附後詠歸橋橋邊絮紛紛橋下水渙渙長吟度春風千載還一旦南阜萬象布幽遐因高窮所詣誰云南阜小獨勝在平地鹿山獸也亦受羈於人毛毨明雪花茸生削紅玉頻頻時一鳴山中豐草緑野性不自適無緣脫羈囚誰懷嘉賓樂感爾空呦呦春日雜詠門前春水滑栁外夕陽斜欲識春風靣滿城紅白花失題谷溜滴雲根垂垂自何至隔竹聽琮琤令人起清思六言絶句元何儒行春日碧桃花開漢苑紫簫聲斷秦樓風暖馬嘶金勒月明人上簾鈎花落鶯翻紅雨峯回鷺點青嵐人别春前春後草迷江北江南江上潮生潮落山中花謝花開生計緑蓑青笠間情白石蒼苔
