body:
  text: 宛陵羣英集巻三元汪澤民張師愚同編古體七言宋林宗放案宗放字問禮淳熙丁未舉進士授廣州通判乞祠致仕自號拙菴老人題韓任道寓軒坤作基天作宇架以虹霓鼇作柱入窻秦雲連楚雨六合為鄰誰障堵試問繩床供仰俯是處江山子作主雲夢胸中著千古明月清風左右取客來問君此為寓莫遣漆園漫無據錢倅生日煌煌我宋開鼇極坐攬輿圖朝列辟玉帛争先萬國趨吳越歸心天下一聖神論報天與同富貴不獨昌其躬建隆以來二百載是家與國方延洪三光五嶽誰言裂秀氣依然貫吳越荀家苗裔何多龍蕭氏衣冠知幾葉賢王忠孝横古今文采到公仍映人一段清氷出秋壑笑言滿腹多精神胷中色絲經緯密華袞政須煩黼黻㑹看𤣥髪映貂蟬豈久銀章佩朱紱轉頭玉樹森琳琅渥洼之種俱顒昂斑斑久矣伏藝苑秋風忽起催騰驤黄金鑄印大如斗世世纍纍還繫肘笑摩銅狄向他年頗記淮山風月否劇暑不可耐戲作冷語排之呈國威同舍兄雲師怒挾風伯狂排山立海恣披猖斯須委雪一丈强殺氣吞日埋扶桑平時身熱號炎荒原註身熱山見西域傳冰山亦復連穹蒼翔風健兒材武良墮指十五半在亡巖谷不問殱虎狼凍合瀛海蛟龍僵蒼生似落冰蠶鄉一氣如縷何可長翻思蹈火勇赴湯誰能排雲挈太陽稍與萬物囘精光客來徵此疑荒唐烏有先生投予方端居炎赫汗反漿試想幻境生清凉潘從大踈齋以舊作題淵明歸來圖詩見贈依韻奉和公歸豈為三逕松取節荆軻讎祖龍平生大義要其終遁身甘混田舍翁肯隨一世皆尚同言言易水詩見志撫卷陟覺辭深雄誰知筆補造化功寓懐麴糵匪昏醉孤忠耿耿蟠心胷紆轡幾許塵埃中柴桑不與車馬通八表同昏雨濛濛皦日行天西復東當年榮木隨時窮黄花今猶傲秋風拜公遺像讀公傳眼髙千載為之空踈齋用前韻記響山之遊依韻奉答空山在昔森萬松兩賢曽此登虯龍流風餘韻無時終我來寒棲鬢成翁人生出處何心同夢破邯鄲幾富貴戰退蠻觸相長雄静定要與山争功繡衣光華照巖壑豁然納我雲夢胷羣峯飛翠匏樽中仙源還有漁舟通須㬰烟霏散空濛樓觀隠約孤城東感慨千古思無窮嘯歌抵掌生英風黄金易求此樂少野人何計簞瓢空李兼秋扇行憶當九夏初恒御君王手西風颯然至持用焉能久人情易變如三秋君恩覆水不可收藉使凉飇奪炎熱感隕此身終不絶題冀缺圖耕夫自立苗且耘饟婦相敬禮如賓畫工貌出態閒暇不是如今愚野人古之農者蓋如此饁彼公田同婦子山林自信有真樂隠逸傳中無姓字吾不能走馬章臺街畫眉狼籍貽譏諧又不能賣酒臨卭市奔妻萬古不滅恥遺風後世豈無存半在東阡烟雨村不見杵臼梁家婦猶能親舉案前飱劉有慶案有慶字元長平江書院山長本蜀郡人初仕南陵主簿遂家焉後官至翰林待詔號損齋子鑄元進士效長吉體窮廬夜雪没駞脊黄沙號風冰結石燕姬二八髻垂漆柔荑斜抱箜篌立老羌踏歌歌勅勒黄金流星酒杯窄紅氍毹暖春雲濕縷金團衣猩血滴玉釵醉滑鵾絃急角聲滿空霜裂骨十萬獰君掩襟泣元王翊龍煎茶春霆發蕾抽新馥搉吏窮搜不容粟是誰千金收寸芽烹鼎車聲繞斜谷白雲飄落甘露椀清風吹破玉川屋平生此腹負將軍空攬十年燈火讀熊不易贄趙小山憶昔初年遊汗漫東南僅厯天之半腰纒騎鶴上揚州意氣江山多壯觀如今天下混一家東際北海西流沙翻令竒士盡羈紲繫而不食吾匏瓜詩裏澄江尋謝朓十年嶔﨑誠可笑首陽有蕨不可食泌之洋洋飢不樂床頭迤邐銷黄金交遊散盡無知心豈無樵耕與漁釣屠沽賈販力不任安能坐受溝壑辱忍死終抱荆山玉何須不著鵕䴊冠奚可無充鼷䑕腹君不見新豐市上窮馬周當時未遇空悠悠一朝際㑹得其所青雲萬里開驊騮我同涸轍急升斗滔滔之人誰援手汝陽天人好事者未知有意憐才否王圭案圭字敬仲與弟璋並以詩名嘗與四明戴表元帥初吳郡郭麟孫祥卿倡和尤工五言送三山陳兄北遊有眼當讀萬巻書有足當涉萬里塗男兒墮地四方志安事一室如枯株君不見周南太史氏又不見西蜀杜陵叟平生足跡半天下身後文章粲星斗陳生七閩士幾嵗雙谿遊今兹忽言别結束趨并幽幽并雄俊地慷慨餘風流千金市駿難復見豈為當代無驊騮君家元龍百尺樓英姿爽氣傾曹劉紆金拖紫何足道朂爾志業追前修和姚竹居按察賦木犀古韻秋林風露摧老物獨為天香破金粟空庭弄影月參差想見當年羽衣曲霜臺詩老清不貧高齋宴坐花為賔芳蕤互映金碧麗正色不假鉛丹勻忘言對此心為寫笑摘繁英呼伯雅不須重續小山詞自有公詩敵瓊斚王璋胡園即事次韻彤霞剪錦蘭為薰東君不知花笑春燭龍銜珠失午夜珊瑚琢簮明翠巾玉堂詩老真天人綵筆揺風花作賓人間譜作看花曲六丁攝取仙官嗔送阮可大赴銓紫霜裘好宛馬肥琢瓊為帶羚角觿路傍借問誰氏子是我昔年同學兒君家儒科有衣鉢伯仲舅甥名翕赫文章都似庾蘭成意氣盡如王景畧驊騮作駒放逺遊封胡羯末渠同流清時用人貴少壯看君談笑取封侯虎頭食肉事良淺廊廟之度要凝逺竹林異日出横枝江左陳留同一阮寄題戴帥初岧嶤亭榆林衆山如仰瓢一峯特起青岧嶤幽人丰標有如此結亭政用山相招俯窺倒影壓滄海仰眩絶頂撐青霄雲開孤峨湘女髻月出時聞王子簫瀛洲方壺若可巢虎豹舔舕魚龍驕不如取山著几案千霞百靄供昏朝主人經營莫辭勞青山得君應更髙君不見峴山湛輩未足數鍾山周顒翻見嘲恨儂不為亭上客擊節為爾山中謡歸當著書持寄似坐對長令人意消汪鑫松間曲松月澹澹松風微松枝鬱鬱松花飛松闗半掩松四圍松下美人歸不歸巢松有鶴舊相識斸松有苓飢可食空山四寂松無聲長吟獨坐松間石梅徳明寧國路别駕禱雨有應亢陽為灾魃為虐草木焦枯金石鑠遂令畎畝飛炎埃自春徂夏失東作我侯閔雨念黎氓憂心如惔禱百靈斬鵞擊罋駿奔走窮呼昊天曽莫聴潨潯之潭深不測下有神龍蟠窟宅鐵符纔沉雲氣黑甘雨一注甦萬物雨餘膏乳平欲流農夫欣欣翠滿疇行當泚筆書大有神功總歸作霖手胡寛贈别秦中趙廷瑞我乃楚狂爾秦俠相看白髮照紅頰文章未獻長楊宮羽騎曽校驪山獵掉臂東游亦壯哉髙登黄金之古臺馬如龍兮車流水昔賢往矣今人來爾彈劒鋏我起舞寒風纒雲散復聚誓當横戈取封侯何事腰刀思剌虎平生此别徒離憂鴻飛㝠㝠天地秋孤帆萬里向江上有才莫過鸚鵡洲有句莫題黄鶴樓九日牟成父先生領諸生過弊廬分韻得白字少壯粗豪那可得老大悲傷復何益平生謀事不如人近日有家猶是客慕歸似病山水淫習懶久成書傳癖二頃難求季子田一區粗卜揚雄宅門臨雪浪細翻漚窻瞰烟嵐髙巻碧種花蒔竹記春秋酌酒調絃送昕夕妻孥績紡賴分燈童稚耕耘長挾冊固知無術競錐刀寧計有餘儲擔石絶交久矣户張羅辟地胡為庭墮舄一翁矍鑠偏眼青羣從風流盡眉白或為竒翼縱雲霄或為駿足辭羈軶維時秋日稍休豫顧我農人及閒隙經丘尋壑不憚勞探賾談𤣥聊自適松根瀹茗涼風吹花底開尊青蘂拆黄雞素鯉旋烹炰園甲溪毛從采摘祗慚空乏奉供需但喜綢繆慰離隔雄豪往往化虚空名勝紛紛寄陳迹土花蕭瑟暗銅臺野燹青熒迷梓澤浮雲富貴勿興哀過箭光隂當共惜今辰行樂鬭題詩留與山房重金璧潘泰之月中桂碧桃漫承天上露白榆漫閱星河曙何如桂樹姮娥家瑶臺玉宇相依據托根泰初鴻濛前天巧那容世人覷涼風挾秋入清夢恍騎素鳳凌空翥徑度銀河入廣寒羽衣霓裳紛在御羣仙接手參翺翔沆瀣可餐英可茹冰輪千里影扶疎靈柯萬古誰能鋸吳剛操斧竟何為郄詵對策髙自譽癡蟇蟠腹飽金粟老襲芳正蹲踞身在清虚樂未央玉殿香風自來去翻憐楚客山之幽空嘆淹留嵗之除髙吟倚樹不成眠俯視塵寰渺何處胡晉慈姥山新開至治河大江東馳瀉寒碧岸束碕盤相蕩射掀騰勃怒走吳津慈姥横來抗勍敵雄磯虎踞當鋭衝猛浪鯨驅擣堅壁洄波亂石吐復吞犀伏蟆浮惡難測懋遷商旅繁貨貲百死求生脱咽嗌擊鼉節號羣挽牽分寸躋攀萬牛力抵巇失勢窘莫支巨舸稠人紛破溺空聞千古嗟地險誰與設謀逃鬼域使君臨郡知為政幕府賔僚贊竒畫轉山取道鑿新河畚鍤雲從歡服役常時劈箭上驚湍忽見澄流布平席楚帆越棹積如林米市酒壚行可緝河名至治應記年五馬觀遊賔彦集洞開天門瀉清風催喚娥眉添黛色舉觴相屬樂功成變易安危在咫尺連艘大賈恩入骨弭檝舟師手加額願公紳笏居廟堂坐使邦家固磐石和子仁弟韻解墜馬之嘲東家生騎驄鬛綠畫革障泥紅軟褥郎君倜儻許借乘過都捷足愁人簇吟鞭快意忽駿奔辟易兒童驚欲哭兩蹄凸出首昂烏奮迅欲將飛電逐鼻尖熾火耳生風目眩青山那暇矚竦身春浪透桃花不學謫仙山倒玉笑聴溪禽脱袴聲縶維今夕留空谷誇豪試險皆爾為欵段安行宜我獨汪珍猛虎詩猛虎猛虎前日食一豚今日食一􅗑豚以備賓客之乾豆􅗑以充宗廟之鼎鬴汝虎食之奈何許山間亦有採樵夫朝來暮去不汝虞乃知汝虎是仁獸豚􅗑縱傷何足吁謹齋夏總管禱雨有應次呂周翰路教韻鼇山揷天何穹穹雙溪下與滄溟通使君夕禱雨晨注東阡西陌禾蓬蓬宣城今號賢太守老我何憂肘生栁須晴即晴雨即雨神意與人同可否歸田願作宣城民宣城使君真可人楊倅照亭禱雨獲龍湫隨感而應汪子潛用龍溪先生韻以美之余亦次韻古湫靈物韜神光蟠龍奮迅箕畢行天瓢憑空澤下土炎歊一轉成清涼帝愁雨師不終惠更敕六馭馳阿香活枯起朽在指顧傾河倒海無留藏使君妙得感應理政績不減漁陽張愛民如子寛猛濟仁同春日威如霜贈中山琴士焦茂卿中山處士家軒轅譜法傳自軒丘仙世人有耳但聴筝與笛何曽識君指下絃為我彈髙山天台泰華高連天孤猨抱樹呌寒日蒼崖疊壁藏飛烟為我彈流水黄河到海深無邉驚風湧波魚出壑疾雷起陸龍騰淵髙山流水兩絶唱坐客不語心惺然花間窈窕囀春鳥葉底幽咽吟秋蟬琅璈瓊珮下寥廓盤車礙石行囘旋闗雎汝墳不作其久矣黍離麥秀荒芊芊鈞天夢斷古意絶城郭雖是人民遷丹丘何處有瑶草辦取布襪青行纒相逢可惜俱是客何時弄月梅花前友雲弟登石井遇雪因宿山中明日寄此詩代簡兩山屈曲盤蒼龍一溪縈紆行玉虹行人竟日溪山中煙綃雲錦開屏風夜來雪脚鳴修竹虎跡泥深君且宿歸來莫厭繭生足袖有芙蓉三十六題牧牛圖呈楊縣尹澤民春陰濛濛雨颼颼南村北村啼鵓鳩陽坡雨足百草柔老奴挾箠行且謳早穀播觜未下疇勸農使者行令遒築塲待汝輸糧糇汝牛力作何時休秋西風蕭蕭羣木槁天外秋雲浄如掃豆葉半枯鴻雁來秔稻俱登雞鶩飽白露夜下天雨霜破籬衰草啼寒螿芋魁如盎茭白老床頭酒熟浮蛆香題九馬圖原註燕五峯參政所蔵穆王八駿日千里曹霸九馬天騏驥余吾渥洼誰寫真厯塊過都俱絶世風低草軟沙綿綿清江平楚開晴川御人釋轡閒且嚴神超意㑹馴不鞭耳錐卓立目鏡圓竒膺聳岳騣連錢朝刷荆吳暮幽燕三十六蹄削鐵堅何為飲秣來江邊毋乃偃武銷戈鋋一匹俛頸呼不旋一匹渴赴清流淵垂纓照影若自愛意豈尚憶天山泉其餘七馬各殊俊白騧獅子毛皆拳長稭短豆棄若土漢南苜蓿青連天不如菰蔣荒平田飢烏落雁相後先錦鞍玉勒紅繡韉何當蹴踏長楸前鵞溪一幅分精妍雄姿逸徳皆天全江都韋諷世不數皮肉雖在意莫傳豈惟駑駘不足騁筆端炯炯房精懸王良伯樂逢何年九馬奚啻一敵千題江少府枯木蒼石圖髯奴渴飲三斗墨吐作槎枒千嵗石石間老樹相樛枝枯皮蝕盡蒼苔色我家昔住山南村老樹蓋屋石對門見君此圖發深省明日還山尋故園仙人石仙人跨鶴歸蓬萊空遺老石封蒼苔秦皇鞭汝偶見脱刼火變盡昆明灰青山萬古復萬古此石年年立江滸須防叱起化為羊還被仙人騎汝去孫逸夫書堂作青山盤盤雲氣度岡巒滅沒互吞吐柘林烟潤繭行絲荷蕩水香魚弄絮人間化物日夜流先生閉門雙鬢秋大隠從來著朝市幽居况近城南樓疎齋先生賦湖隂曲書以為贈予遂賦一首一虎穴中臥六龍江上飛蛇矛半折柝聲斷晝夢驚怪日遶圍鼓聲逢逢天四黑五騎爬沙行不及道旁遺矢冷于冰天上寶鞭人未識江風夜捲湖隂水明日腥氛當一洗荒亭千古寄興亡目斷蒼煙濕衰葦何致中案致中字鶴齡號華陽山人次韻建平謝伯賢寄所詠錢舜舉畫馬詩巻沙平霜乾苜蓿葉雲隔天閑風淅瀝麟駒絶塵不可見試展畫絹臨雪壁老錢著色筆勢雄信手掃出連錢驄駿骨一洗羣馬空龍媒可是生崆峒世上豈無如此馬大半困厄鹽車下縱使伯樂今猶存一顧千金誰著價伯時此藝尤其精後來改畫旃檀身勸君按圖休索驥吟巻墨花香奕世貢奎除日登大巖山大巖顒顒昂衆峯長年色秀摩蒼穹中峯獨髙勢若雄支牽脉貫相附庸朝賔大明滄海東巒岫勃鬱凝青紅懸崖萬仞寒潭空下有晴雲生喬松形勞膽怯望莫窮但覺一氣浮鴻濛松摧雪凍藏蟄龍峯巔鎮以龍王宮擁潭出雲如白虹妖魃却走年穰豐南村北崦篁樹叢喧招巫覡撾鼓鐘苔荒怪石低復崇嵌空欲墮疑神功直者覆釡横列墉森布兵㦸羅羣童盤迴絶頂路杳通攀藤舉膝撑心胷嗟予北游覽岱宗大行西來連華嵩浮生萬里隨飛蓬夢寐豈與當時同虎行草偃吹烈風苦寒側翅號冥鴻麻姑敬亭知幾重李謝空復遺塵蹤悲來狂呼赤鯶公五湖烟波駕歸篷題風林牧馬圖春沙碧草如雲起厮官牧馬垂楊底趙侯落筆有天機神光咫尺藏千里渥洼龍媒空復竒至性却愛人間羈嗚呼伯樂亦已往凄凉自足傳真賞送酈肖梅道士歸三茅人間六月火雲熱川魚深逝飛鳥絶坐念君歸不可留明日沙頭當送别詩人磊落唾成珠酒酣惆悵歌擊節南湖鼔棹時乗風曉起披襟夜延月從今此樂誰復同囘首故人須共説落木蕭蕭鴻雁征我將攜硯遊東越相思應許夢魂飛萬里三茅蒼翠色張師愚贈散牛逸人連山新綠春風前爾牛來往無人牽何曽服箱勤畎畝終年蕭散全其天飢飡芳蓀渴飲水鳴聲滿脰黄鍾起爾心有樂那得知山中逸人能了此莊周不願為犧牛𢎞景獻畫辭公侯古來賢達厭物繫底須文繡金籠頭蒭茭無儲嵗將暮問牛可為牛不語操鞭牽鼻三十年却笑溈山看水牯送韓黙齋去年江邊君送客春洲兩岸楊花白今年湖上我送君飄飄秋風吹白蘋芒鞋竹杖直屬我功名合讓年少人千山萬山煙樹碧酒盡清歌為君發斜陽囘首敬亭遥明月懐人楚天闊驅車道路寧辭勞黄金臺上須時豪㑹看鯤鵬起霄漢下視斥鷃猶蓬蒿陳萬鈞案萬鈞字公茂一字衡甫和韓廷玉夜過采石韻江烟靡靡江月黑寒光照耀玻瓈色當年江上錦袍人騎鯨一去無消息天生此境絶險艱驚湍九道奔空山今宵波平浪如砥舟行恍若圖畫間欲問燃犀是何處漁父鳴榔隔烟霧羡渠鷗鷺獨忘機占盡滄浪自來去王虎臣案虎臣字子山璋之子仕於潜教諭題段徳卿舟亭歌君不見伏波功臣萬里旋歸來薏苡遭讒言壺頭晚困始憶少游語中流仰嘆看飛鳶又不見范蠡扁舟載西子急流勇退如避死當年懐寵不見機詎忍將身嘗烏喙兩翁功名尚如此餘子紛紛何足據段生樂道心自閒有眼不識行路難舟亭無颿亦無檝風雨不動安如山知君市隠心似鐵含哺熙熙足怡悦任渠風浪欲掀天我獨推篷看明月題古硯阮受益所藏古硯篆文有羽陽千嵗字蓋秦穆宮瓦也洛波沉鼎周姬衰秦嬴義勇歌無衣戎車虎帥雄西陲羽陽宮殿雲崔嵬孟明骨化蹇叔死三良殉穆秦民悲西風一夜飄宮瓦鴛鴦飛墜秦臺下千年鳥跡愈分明故國遺蹤恨難寫何人磨作古陶泓遂使名聲齊玉斚君不見懸黎結綠人不識刖足君門卞和泣古來義士苦不遭埋骨泥沙同瓦礫繰絲行輸班輪機旋若風吳姬拮据無好容神蠶遭烹不自悔以死利世功無窮當空一縷如抽雪宛轉縈紆無斷絶誰知中有長恨端心事從今為君説車聲愈急絲愈永比妾愁膓猶易盡去年絲成盡入官敝衣不足常苦寒今年蠶苗猶在紙已向豪家借倉米探湯入緒手欲爛辛苦無人慰憔悴生平自知妾命薄詎忍將愁訴夫婿吳綾蜀錦多光輝明朝已上他人機蠶婦嘆貧農值年凶終嵗常苦飢貧女蠶不收終年廢機絲無食夫婿事無衣妾心悲終朝掇柔桑日暮心力罷居然不成繭何以慰我思君不見金谷園中歌舞妾金縷衣裳自盈篋一朝禍起墮髙樓翠袖紅衿如電滅嗟嗟蠶婦莫憂寒孟光身上衣無完凌希惠案希惠字季和宋工部侍郎筞十一世孫題良驥圖千金買駿骨絶足來異域尺素寫龍媒元非按圖索古人觀馬在天機眼中不見黄與驪吾觀畫馬亦相類逸氣横出驪黄外王君下筆殊可人紫艶一洗凡馬羣朝燕暮越汗流血肯受青絡羈黄塵撫巻懐若人此意知誰識覂駕固可竒在徳不在力題太平汪公仲雲松樓黄山削翠摩層空下視衆岫培塿同丹崖雪竇相掩映一支北走如翔龍樓居下有隠君子擇幽面勢雕青紅遂令巖壑千萬態一覽盡在雙眸中白雲輸雨出深谷蒼松倚壁來清風非徒為人滌煩暑亦且與國成年豐松聲雲氣入清玩俯欄不覺輕千鍾儒宗珍畫有深意猿鶴起舞山改容明當登髙為君賦寫我磈磊平生胷
