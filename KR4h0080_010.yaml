body:
  text: 宛陵羣英集卷十元汪澤民張師愚同編今體七言律元施震仲寄朱理甫别後誰憐久索居寄書長恨便鴻無青山招隱思佳士白髮催人惜壯圗休羡羊何臨海嶠願如朱陸會鵝湖肯來邂逅成清話不用郫筒滿眼酤原注理甫不嗜酒趙由皎餞孔常軒館木塔寺東魯宣尼幾世孫春風吹上育王城葛藤已許參獅窟竹簡何妨挾兔園一變悠悠驚世夢久晴脈脈落溪痕長年來往城中路木塔相尋莫憚煩趙由偏送汪叔志入京會試奎宿韜躔四十年喜頒新詔又求賢間門養拙慚吾老上國觀光屬子先兩袖秋香攀桂月九重春宴看花天男兒自有沖霄志萬里亨衢快著鞭董天吉夀齊諾監司緑鬢貂蟬合殿中輶車又過大江東九重行侍君王燕五度曽乘御史驄好學襟懷開霽月愛民心事藹春風夜深香火聽輿誦好是稱觴夀母同寄題戴帥初岧嶤亭道家冠服出風塵且為岧嶤作主人座上好山青對起門前流水緑橫陳間情倦翼凝情逈酒盞棋枰發興新千里情交都在眼與亭相逺似相鄰送侍其總管任浙東亷使二首曽聞鼻祖牧宣州又見邦人誦我侯世閲雙旌相絢映人生五馬自風流西偏清嘯獨孤觀北望髙吟小謝樓此去驊騮諳舊路定知原隰望咨諏畫戟凝香禮數殊敢勤屣履下庸愚有時小隊尋花柳也枉前茅到竹梧原注董有竹梧亭對客每曽蒙齒録問年直恐混泥途使君早晚朝天闕還念滄江釣叟無王經國按宛雅作繼國上髙總管勸農二首福星臨耀野人家竹馬紅旗夾道遮相對老農分茗果更呼牧竪問桑麻前茅喜氣占鳴鵲嘉穀豐年卜吠蛙何似使君心感召豚蹄休更祝汙邪朱旗雕騎使君來踏碎柴關一徑苔細説桑麻情繾綣肯披荆棘陟崔嵬持豚笑聽禳田頌薦鮪香酣祭社杯最好啼鶯飛鷺處水光山色共徘徊孫煥文賀那僉事除學士皇華江左遍咨詢又趣行裝覲紫宸玉笋聨班新學士金蓮賜炬舊詞臣天開熙洽生時彥地占深嚴隔世塵聖代崇文千載遇好將儒術展經綸送汪叔志赴京會試鄉曲羣英推獨步春秋奧學信淵源鵬程擊水三千里鳳詔興賢第一畨蘭省芳名題淡墨玉階大對吐忠言青氊光復慈顔喜又報松林出狀元送汪叔志之嶽州路平江州同鄉閭兩薦收科第喜奉潘輿逺宦遊直上雲霄初發軔平分風月暫為州嶽陽仙迹詢遺老湖右儒林接勝流內翰垂芳應百世青氊行復黼皇猷陶景威示朱氏表姪兄弟少壯馳驅意氣豪曽從甥館接時髦故家文獻逢聨璧奕世衣冠嘆二毛正爾管寧甘白帽不應范叔戀綈袍山中回首皆陳迹痛飲惟須讀楚騷次趙松壑贈别韻銷聲息影寄巖阿已分衰遲井不波陶令田園祗自種翟公門户竟誰過帆開江上碧雲合愁滿階前紅葉多莫謂長才終逆旅會將經濟佐常何張思濓贈軒轅道士子是彌明幾代孫姓名乃使世人聞坐驚星斗生雷劒行覺煙霞繞練裙月裏白鸞招子晉山前青虎借茅君長春酒熟朝朝醉髙枕瑶琴卧緑雲次韻江鍊師道人容貌似嬰孩手抉天罡步斗魁挂杖神遊却月觀凌風夜上鍊丹臺劒橫秋水蒼龍化夜染春雲玉女裁聞道蓬萊隔東海芙蓉三朵翠成堆戲贈報恩觀道士絳綃法服碧雲冠玉磬金鐘每夜闌壇上步虛黃籙醮箕邊懸筆紫姑欒甲丁並走妖精碎雷電雙飛雨氣寒莫訝先生耽酒肉杭人誰識爛頭潘原注潘守元字無涯臨平景星觀提點善雷法丁繼道贈都門道士欽雲深大隱從來傍市㕓五雲深處有神仙金丹九轉地靈泣鐵笛一聲山月圓無事焚香消白日有時騎鶴上青天自今了却塵寰債借我松窗半榻眠丙子春自閩海進柑至信州沙溪驛遇天師真人朝京遂賦此以上之鸞驂鳳輦出蓬萊虎窟龍湫到處開四海鬼神符役走九天雷電劔驅來玄袍香惹黃金殿御酒光搖白玉杯喜動龍顔承厚渥春風萬里寶車回送汪必大尊師歸龍虎山鹿裘偏耐莫春寒船上桐江雨腳乾袖裏風雷三尺劔胸中子午一丸丹騎龍飛去人應易化鶴歸來事不難見説鄉溪舊仙院白雲終日護松關王彛濟川橋成美二郡二郡下車憂病涉彩虹依舊壯宣城向來對面風波隔今日驅車袵席行秋水魚龍驚卧影中天星斗簇飛甍他年四海皆康濟應許孤舟野渡橫李至善病起懷家山之久别兄弟之暌離即事偶成晚望荒城重感嗟十年行客倦思家渚田稻薄無來鴈庭樹枝寒少宿鴉書為在官長廢讀酒因多病久停賖何時日暖尋初約同探疏梅著幾花和吳間間送張玄谷詩韻得道長生學賀玄跫然空谷足音傳六龍朝罷香盈袖獨鶴歸來月滿天葉玩山中仙子篆書藏圮上老人編玉章繡句吳門贈好刻琅玕紀嵗年孫叔逺送監憲丁太初除內省參議天錫殊恩下帝京繡衣催換錦衣榮臯夔事業酬初志堯舜君民在此行白玉堂前春色早紫薇花外漏聲清人材從此宜收拾同與皇家致太平送楊推官滿任今代楊君政可師隂功多在洗寃時唐朝文藻誇三喜漢吏清亷説四知詩句精神池草夢雨聲消息杏花枝江東殿最還公論好為條陳對玉墀孫彛送侍其總管之浙東廉使風度當今第一流幾年五馬踏南州紫泥香動九重詔繡斧光搖八詠樓父老自憐難借冦書生猶恨失依劉越山重見氷霜厲棠蔭龜城春在不貢瑜挽仲章叔父齊山發軔已馳名金馬門深屬老成蓮燭幾回供御直棘闈三度掌文衡築亭奉母人間樂飲水居官物外情從此竹林無舊賞臨風揮淚憶平生奚繼學挽趙陽山生辭人生大夢誰能覺衆醉昏昏公獨醒半世虛名秋鬢白一編實録夜燈青達觀共閲生前傳諛墓何庸身後銘未問蓋棺并荷插相逢一笑且忘形貢松挽劉文甫地連桑梓重懷思逝水東流不盡時古月今人安得共晨星霜木俱堪悲昔遊未結蘭金友既往空嗟薤露辭我亦衰遲增感慨青山白石映鬚眉馮嚞送汪叔志入京會試緑髮儒林久著聲承家經術自簪纓車書萬里開文運天地一畨生俊英已喜秋風蜚鶚薦更看雲路奮鵬程九重對罷臨軒䇿歸拜慈闈祿養榮潘俞題存悔老人後傳北風不貸緑荷衣三十年來甲子詩公族尚存麟趾意故都空寄黍離悲篋中有筆遺家傳身後無金買墓碑惆悵斯人滯空谷紛紛餘子坐臯比次劉宗臣表兄生日韻緑楊巷陌久分隂衰病如今雪半侵舉世劇為雲雨手愛君獨有弟兄心螢窗雪案多雄辨月榭風櫺幾醉吟夀席一杯無事酒畸人多謝費招尋阮麟翁次耿參政韻雲耕月釣老書生曽玷朝班録姓名萬里驅馳曕魏闕一官落拓守江城鵬搏北海風斯下鵲繞南枝月正明百尺竿頭容進步筆端轉處即欣榮梅實送董憲使金甌玉鉉舊家聲使節南來此按臨家有春秋三對䇿囊無暮夜四知金東風忽動歸田興今日難忘卧轍心蔽芾甘棠休剪伐江東父老去思深戴芳送廉使傅公持節江東又四年一襟風月浩無邊神馳華嶽三千里身到長安尺五天客路黃花明白髮别筵緑醑照金船從兹早慰蒼生望便合為霖復舊氊張志合送楊長卿之任贑州路知事千里名藩江右郡軍民伉健俗還淳紅蓮緑水逢佳士白酒黃雞别故人贑石連灘攢劔戟廉泉一勺洗埃塵辭金素有風霜操贊酒行施雨露春附七言律詩按永樂大典內凡係失名失題無考者附後喜雨兵戈飢疫苦相仍天亦愁聞痛哭聲好雨知時隨地足餘民忍死待秋成已蘇園圃嘉生茂更洗閭閻厲氣清力挽天河須壯士瓣香萬夀祝皇明送馬伯庸學士赴上都人間六月沸炎波上國清涼樂事多視草舊傳真學士散花新起病維摩千年結友心相似萬里辭家意若何料想勝遊偏得句秋風先寄鴈南過許丞仲逺白首選調而詩益工不鄙余謂可教數以授之區區雖知愛尚顧無相為薦達因竊感慨賦此兩章非徒以慰藉仲逺而已也亦風諸有力者使動心焉每誦君詩輒會心倐然野雪想山隂古風已轉清平調俗學寧論正始音執戟草玄勞衍測參謀垂白慣浮湛何人與布咸陽市相國猶能字十金杯酒相尋二十年故交零落半新阡揚眉結義滔滔是袖手觀詩往往然不恨菰蓴漂甫里所憐槐竹老藍田須公更和三髙賦會有吹噓達九天題廬山上花成寺樓臺髙聳入中天壓破寒山數畝煙永日松欄幽鳥語半空巖石老僧禪窗臨樛木排深澗簷拂長蘿下翠顛野客每來何所得一聲秋磬似相便杜善甫母年八十索詩杜羔至行尚流聲又見聞孫繼美名永日忘憂萱草長春風送喜板輿輕何妨靡盬從王事細説平反慰物情聖代只今隆孝理會開湯沐侈恩榮歸自杭城周千之以詩見贈次韻柳岸清遊逐舞塵歸來猶憶六橋春湖波瀲灧揚舲穩山徑委蛇得句新怪石生來懸象鼻神魚飛出現龍身原注是日探煙霞摩象鼻遊玉泉觀飛魚心知綽約溪濱女不是桃花洞裏人讀項羽傳逐鹿中原志未酬息兵暫擬割鴻溝重瞳似舜終何益三户亡嬴讖亦休江左豈無秦父老關中已屬漢諸侯萬人一劔都無用怕見虞姬地下羞潯陽舟中與王元舉别飛佩衡湘萬里遊相逢竒士集仙舟缺壺歌斷心猶壯刻燭詩成老更遒幕府豈能淹驥足文章自可占鰲頭平生湖海輕餘子好卧元龍百尺樓題宋梅洞獻書圗十年送别今同客一笑談詩重起豫周禮盛聞殷士祼漢庭喜見伏生書青燈較藝飛蛾集白髮離家過鴈疏塜壁殘文如可續百篇應許論虞初元處士自洛歸宛陵山居見示詹事相公餞行之什因贈紫霄峯下絶韋編舊隱相知結襪前原注元君舊隱廬山學易常為相國師服月落尚留東閣醉風髙還憶北窗眠江城夜别蕭蕭雨山檻晴歸漠漠煙一頃豆花三頃竹想應拋却釣魚船汪希聲書堂作衡簷睥睨壓疏櫺平割黃山一半青落日捲雲隨鶻沒黑風吹雨帶龍腥人間軒冕駒間皂身外乾坤水載萍我正江湖子林壑客星未減少微星四月九日新霽景氣清淑偕宗英公仲自天都峯側遊湯泉道中偶成天都敻出諸峯上曙色嵐開逸興催半壁暗泉吹冷雨懸崖飛瀑吼晴雷白雲縹眇仙鄉近碧落髙寒俗駕回自笑平生愛清境宴搜不厭厯崔嵬番禺區善叔奉憲司命買書江浙間將以實之郡學尊經閣其部使者之賢蓋可知矣區君過宣城賦詩送之有客衣冠萬里行收書捧檄過昭亭士行運甓逢州牧區册拏舟自海溟插架懸籖空蠧帙還珠買櫝豈通經天生才質無遐邇會有鴻儒動漢庭病中言懷原注辛未七月晦日一卧煙霞十五秋青雲事業付滄洲吞江久病相如渴報國空懷杜老憂花院竹亭宜鶴氅藥囊書卷是菟裘毒蛇未悟杯中影灑翰聊成物外遊挽吾夫人汪氏鶴髮承顔有寧馨久知孟母著儀刑恩封真配二千石眉夀將髙八十齡烏哺林寒驚往夢牛眠地吉勒新銘由來積善徴餘慶蘭玉森然正滿庭和韓庭玉早發蕪湖韻水驛嚴程下急湍此行王事正相干帆開萬里煙波濶衣帶半天星斗寒道路從來愁客子詩書元不誤儒冠誰憐老我昭亭麓一樹梅花竹數竿陳使君席上舍人退食倦清班勇往州麾去莫攀釃酒舞裾歌扇外携賔茅舍竹籬間緑田灧灧春耕早畫戟森森晝衛間盍遣孤雲霈豐澤不應多羡敬亭山賀除左史容臺左職末多時便結絲絇立左螭我亦自慚三黜後人皆見謂十年遲躋攀寸步今如許咫尺清光喜可知已是玉皇香案吏願輪忠赤罄論思挽貢仲堅東海揚塵憶釣鼇北亭恩澤眷時髦武林講學春風暖彭澤移封晚節髙華萼聨榮端象笏芝蘭出色映緋袍蓬萊夢斷清名在哀些空嗟里有蒿雙頭同心芍藥出西城居民家雙花窈窕照春深盡日憑闌費苦吟背面紫雲分寶髻合歡金縷結同心歌殘溱洧休相贈瑞出維揚可重尋共向東風承雨露不辭玉砌與山林挽葉承事雨露重新下九天聖明知有子孫賢山林事業陶𢎞景詩酒襟懷孟浩然化鶴不驚來此客狎鷗相值憶當年一邱一壑委蛇地寥落風煙黯逝川挽郭僉事壯志亨衢早亢宗聲華籍甚播諸公花封春暖曽馴雉柏府霜清共避驄正爾使軺勞問俗忽驚仙珮去乘風故鄉歸葬三千里目斷銘旌獵獵紅失題六朝宫闕鎖黃埃王謝諸賢喚不回半世江湖成老去滿天風雨挾愁來倚門夢寐家千里逆旅情懷酒一杯終有林塘歸舊隱寄言鷗鷺莫相猜
